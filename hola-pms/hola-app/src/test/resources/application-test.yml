spring:
  # TestContainers PostgreSQL
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///hola_pms_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100

  # Flyway - 스키마(~V5_8_0) + 테스트 패치(version 컬럼 등 DDL)
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/testpatch
    baseline-on-migrate: true
    out-of-order: true
    target: 5.8.0

  # Thymeleaf
  thymeleaf:
    cache: false

  # Redis 비활성화
  data:
    redis:
      repositories:
        enabled: false

  # Jackson
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

server:
  port: 0

# JWT 설정
jwt:
  secret: holapms-test-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

hola:
  upload:
    path: /tmp/hola-test-uploads

logging:
  level:
    root: WARN
    com.hola: INFO
    org.testcontainers: INFO
