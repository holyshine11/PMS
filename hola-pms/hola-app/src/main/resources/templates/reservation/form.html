<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>예약 등록</title>
</head>
<body>
<div layout:fragment="content">
    <!-- 프로퍼티 미선택 알림 -->
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <div id="formContainer" style="display:none;">
        <h4 class="fw-bold mb-3"><i class="fas fa-calendar-plus me-2"></i>예약 등록</h4>

        <!-- 탭 네비게이션 -->
        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#tabReservation" role="tab">예약정보</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#tabDetail" role="tab">상세정보</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#tabDeposit" role="tab">예치금정보</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#tabEtc" role="tab">기타정보</a>
            </li>
        </ul>

        <div class="tab-content">
            <!-- ═══ Tab 1: 예약정보 ═══ -->
            <div class="tab-pane fade show active" id="tabReservation" role="tabpanel">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <!-- 예약 기본 정보 -->
                        <h6 class="fw-bold mb-3"><i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> 예약 기본 정보</h6>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label required">체크인</label>
                            <div class="col-sm-4">
                                <input type="date" class="form-control" id="masterCheckIn">
                            </div>
                            <label class="col-sm-2 col-form-label required">체크아웃</label>
                            <div class="col-sm-4">
                                <input type="date" class="form-control" id="masterCheckOut">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label">레이트코드</label>
                            <div class="col-sm-4">
                                <div class="input-group">
                                    <input type="text" class="form-control" id="rateCodeName" readonly placeholder="선택">
                                    <button class="btn btn-outline-secondary" type="button" id="rateCodeSearchBtn"><i class="fas fa-search"></i></button>
                                    <button class="btn btn-outline-danger" type="button" id="rateCodeClearBtn"><i class="fas fa-times"></i></button>
                                </div>
                                <input type="hidden" id="rateCodeId">
                            </div>
                            <label class="col-sm-2 col-form-label">마켓코드</label>
                            <div class="col-sm-4">
                                <div class="input-group">
                                    <input type="text" class="form-control" id="marketCodeName" readonly placeholder="선택">
                                    <button class="btn btn-outline-secondary" type="button" id="marketCodeSearchBtn"><i class="fas fa-search"></i></button>
                                    <button class="btn btn-outline-danger" type="button" id="marketCodeClearBtn"><i class="fas fa-times"></i></button>
                                </div>
                                <input type="hidden" id="marketCodeId">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label">예약채널</label>
                            <div class="col-sm-4">
                                <select class="form-select" id="reservationChannelId">
                                    <option value="">선택</option>
                                </select>
                            </div>
                            <label class="col-sm-2 col-form-label">프로모션</label>
                            <div class="col-sm-4">
                                <input type="text" class="form-control" id="promotionCode" placeholder="프로모션 코드">
                            </div>
                        </div>

                        <!-- 예약자 정보 -->
                        <h6 class="fw-bold mb-3 mt-4"><i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> 예약자 정보</h6>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label">예약자명(국문)</label>
                            <div class="col-sm-4">
                                <input type="text" class="form-control" id="guestNameKo" placeholder="예약자명">
                            </div>
                            <label class="col-sm-2 col-form-label">전화번호</label>
                            <div class="col-sm-4">
                                <div class="input-group">
                                    <select class="form-select" id="phoneCountryCode" style="max-width:90px;">
                                        <option value="+82">+82</option>
                                        <option value="+1">+1</option>
                                        <option value="+81">+81</option>
                                        <option value="+86">+86</option>
                                    </select>
                                    <input type="text" class="form-control" id="phoneNumber" placeholder="010-1234-5678">
                                </div>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label">영문 성</label>
                            <div class="col-sm-4">
                                <input type="text" class="form-control" id="guestLastNameEn" placeholder="Surname">
                            </div>
                            <label class="col-sm-2 col-form-label">영문 이름</label>
                            <div class="col-sm-4">
                                <input type="text" class="form-control" id="guestFirstNameEn" placeholder="Given Name">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label">이메일</label>
                            <div class="col-sm-4">
                                <input type="email" class="form-control" id="email" placeholder="example@email.com">
                            </div>
                            <label class="col-sm-2 col-form-label">생년월일</label>
                            <div class="col-sm-4">
                                <input type="date" class="form-control" id="birthDate">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label">성별</label>
                            <div class="col-sm-4">
                                <select class="form-select" id="gender">
                                    <option value="">선택</option>
                                    <option value="M">남성</option>
                                    <option value="F">여성</option>
                                </select>
                            </div>
                            <label class="col-sm-2 col-form-label">국적</label>
                            <div class="col-sm-4">
                                <input type="text" class="form-control" id="nationality" placeholder="KOR" maxlength="5">
                            </div>
                        </div>

                        <!-- OTA 정보 -->
                        <h6 class="fw-bold mb-3 mt-4"><i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> OTA 정보</h6>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label">OTA 관리</label>
                            <div class="col-sm-4">
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" id="isOtaManaged">
                                    <label class="form-check-label" for="isOtaManaged">OTA 수정제한 모드</label>
                                </div>
                            </div>
                            <label class="col-sm-2 col-form-label">OTA 예약번호</label>
                            <div class="col-sm-4">
                                <input type="text" class="form-control" id="otaReservationNo" placeholder="OTA 예약번호">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ═══ Tab 2: 상세정보 (객실 레그) ═══ -->
            <div class="tab-pane fade" id="tabDetail" role="tabpanel">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="fw-bold mb-0"><i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> 객실 목록</h6>
                            <button type="button" class="btn btn-primary btn-sm" id="addRoomBtn">
                                <i class="fas fa-plus me-1"></i>객실 추가
                            </button>
                        </div>
                        <!-- 객실 레그 목록 (동적 추가) -->
                        <div id="roomLegsContainer">
                            <!-- JS에서 동적 생성 -->
                        </div>
                        <div id="roomLegsEmpty" class="text-center text-muted py-4 border rounded">
                            <i class="fas fa-bed me-1"></i>등록된 객실이 없습니다. [객실 추가] 버튼을 클릭하세요.
                        </div>
                    </div>
                </div>
            </div>

            <!-- ═══ Tab 3: 예치금정보 ═══ -->
            <div class="tab-pane fade" id="tabDeposit" role="tabpanel">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="fw-bold mb-3"><i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> 예치금 정보</h6>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label">예치 방법</label>
                            <div class="col-sm-4">
                                <select class="form-select" id="depositMethod">
                                    <option value="">선택</option>
                                    <option value="CREDIT_CARD">신용카드</option>
                                    <option value="CASH">현금</option>
                                </select>
                            </div>
                        </div>
                        <div id="creditCardSection" style="display:none;">
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">카드사</label>
                                <div class="col-sm-4">
                                    <input type="text" class="form-control" id="cardCompany" placeholder="카드사명">
                                </div>
                                <label class="col-sm-2 col-form-label">카드번호</label>
                                <div class="col-sm-4">
                                    <input type="text" class="form-control" id="cardNumber" placeholder="1234-5678-9012-3456">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">유효기간</label>
                                <div class="col-sm-4">
                                    <input type="text" class="form-control" id="cardExpiryDate" placeholder="MM/YYYY">
                                </div>
                                <label class="col-sm-2 col-form-label">CVC</label>
                                <div class="col-sm-4">
                                    <input type="password" class="form-control" id="cardCvc" maxlength="4" placeholder="CVC">
                                </div>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label class="col-sm-2 col-form-label">예치금액</label>
                            <div class="col-sm-4">
                                <div class="input-group">
                                    <input type="number" class="form-control" id="depositAmount" value="0" min="0">
                                    <span class="input-group-text">원</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ═══ Tab 4: 기타정보 ═══ -->
            <div class="tab-pane fade" id="tabEtc" role="tabpanel">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="fw-bold mb-3"><i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> 고객 요청사항</h6>
                        <div class="row mb-3">
                            <div class="col-12">
                                <textarea class="form-control" id="customerRequest" rows="4" placeholder="고객 요청사항을 입력하세요."></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 하단 버튼 -->
        <div class="d-flex justify-content-between mt-3">
            <div></div>
            <div>
                <a href="/admin/reservations" class="btn btn-secondary me-2">
                    <i class="fas fa-arrow-left me-1"></i>취소
                </a>
                <button type="button" class="btn btn-primary" id="saveBtn">
                    <i class="fas fa-save me-1"></i>저장
                </button>
            </div>
        </div>
    </div>

    <!-- ═══ 레이트코드 선택 모달 ═══ -->
    <div class="modal fade" id="rateCodeModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title"><i class="fas fa-won-sign me-2"></i>레이트코드 선택</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="input-group">
                                <input type="text" class="form-control" id="rateCodeSearchKeyword" placeholder="코드명을 입력하세요.">
                                <button class="btn btn-outline-primary btn-sm" id="rateCodeSearchAction"><i class="fas fa-search me-1"></i>검색</button>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table id="rateCodeSelectTable" class="table table-hover table-bordered mb-0" style="min-width:600px">
                            <thead class="table-light">
                            <tr>
                                <th style="width:50px" class="text-center">NO</th>
                                <th style="min-width:100px">레이트코드</th>
                                <th style="min-width:120px">코드명</th>
                                <th style="min-width:80px" class="text-center">카테고리</th>
                                <th style="min-width:180px" class="text-center">판매기간</th>
                                <th style="width:60px" class="text-center">선택</th>
                            </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" id="rateCodeApplyBtn"><i class="fas fa-check me-1"></i>적용</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ 마켓코드 선택 모달 ═══ -->
    <div class="modal fade" id="marketCodeModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title"><i class="fas fa-tags me-2"></i>마켓코드 선택</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="input-group">
                                <input type="text" class="form-control" id="marketCodeSearchKeyword" placeholder="코드명을 입력하세요.">
                                <button class="btn btn-outline-primary btn-sm" id="marketCodeSearchAction"><i class="fas fa-search me-1"></i>검색</button>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table id="marketCodeSelectTable" class="table table-hover table-bordered mb-0" style="min-width:500px">
                            <thead class="table-light">
                            <tr>
                                <th style="width:50px" class="text-center">NO</th>
                                <th style="min-width:100px">마켓코드</th>
                                <th style="min-width:120px">코드명</th>
                                <th style="min-width:150px">설명</th>
                                <th style="width:60px" class="text-center">선택</th>
                            </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" id="marketCodeApplyBtn"><i class="fas fa-check me-1"></i>적용</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ 객실타입 선택 모달 ═══ -->
    <div class="modal fade" id="roomTypeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">객실타입 선택</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">객실타입 검색</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="roomTypeSearchKeyword" placeholder="객실타입을 입력하세요.">
                                <button class="btn btn-outline-primary btn-sm" id="roomTypeSearchAction">검색</button>
                            </div>
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="showAllRoomTypes">
                                <label class="form-check-label" for="showAllRoomTypes">전체 객실타입 보기</label>
                            </div>
                        </div>
                    </div>
                    <div id="roomTypeContent"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" id="roomTypeApplyBtn">적용</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ 객실 배정 모달 ═══ -->
    <div class="modal fade" id="roomAssignModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title"><i class="fas fa-door-open me-2"></i>객실 배정</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <!-- 요금 요약 -->
                    <div id="assignPriceSummary" class="border-bottom p-3" style="background: linear-gradient(135deg, #051923 0%, #003554 100%);">
                        <div class="row text-center">
                            <div class="col-4">
                                <small class="d-block mb-1" style="color: rgba(255,255,255,0.7); font-size: 0.75rem; letter-spacing: 0.5px;">총 요금</small>
                                <span id="assignTotalPrice" class="d-block" style="color: #fff; font-size: 1.25rem; font-weight: 700;">-</span>
                            </div>
                            <div class="col-4 border-start border-end" style="border-color: rgba(255,255,255,0.15) !important;">
                                <small class="d-block mb-1" style="color: rgba(255,255,255,0.7); font-size: 0.75rem; letter-spacing: 0.5px;">1박 평균</small>
                                <span id="assignAvgNightly" class="d-block" style="color: #fff; font-size: 1.25rem; font-weight: 700;">-</span>
                            </div>
                            <div class="col-4">
                                <small class="d-block mb-1" style="color: rgba(255,255,255,0.7); font-size: 0.75rem; letter-spacing: 0.5px;">숙박일수</small>
                                <span id="assignNights" class="d-block" style="color: #fff; font-size: 1.25rem; font-weight: 700;">-</span>
                            </div>
                        </div>
                    </div>
                    <!-- 탭 -->
                    <ul class="nav nav-tabs px-3 pt-3" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" data-assign-tab="recommended" type="button"><i class="fas fa-star me-1"></i>추천 객실</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-assign-tab="all" type="button"><i class="fas fa-list me-1"></i>전체 객실</button>
                        </li>
                    </ul>
                    <!-- 본문 -->
                    <div id="assignContent" class="p-3">
                        <div class="text-center py-5 text-muted">
                            <i class="fas fa-spinner fa-spin me-1"></i> 객실 정보를 불러오는 중...
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" id="btnApplyRoomAssign"><i class="fas fa-check me-1"></i>적용</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/reservation-form.js}"></script>
</th:block>
</body>
</html>
