<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>일별 예약 목록</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <a href="/admin/reservations" class="text-decoration-none text-dark">
                <i class="fas fa-arrow-left me-2"></i>
            </a>
            <i class="fas fa-calendar-day me-2"></i>일별 예약 목록
            <span id="dailyDateLabel" class="text-muted ms-2" style="font-size:1rem;"></span>
        </h4>
    </div>

    <!-- 프로퍼티 미선택 알림 -->
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <!-- 테이블 -->
    <div id="dailyTableCard" class="card border-0 shadow-sm" style="display:none;">
        <div class="card-body">
            <table id="dailyTable" class="table table-hover mb-0" style="width:100%">
                <thead class="table-light">
                <tr>
                    <th>예약번호</th>
                    <th>상태</th>
                    <th>예약자</th>
                    <th>객실</th>
                    <th>체크인</th>
                    <th>체크아웃</th>
                    <th style="width:80px">관리</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/reservation-daily.js}"></script>
    <script>
    $(function() {
        // URL에서 date 파라미터 추출
        var urlParams = new URLSearchParams(window.location.search);
        var date = urlParams.get('date');

        if (date) {
            $('#dailyDateLabel').text(date);
        }

        // 프로퍼티 확인 후 초기화 (init은 무조건 호출하여 bindEvents 누락 방지)
        var propertyId = HolaPms.context.getPropertyId();
        if (propertyId) {
            $('#dailyTableCard').show();
            ReservationDaily.init(propertyId, date);
        } else {
            $('#contextAlert').removeClass('d-none');
        }

        // 컨텍스트 변경 이벤트 (init 이후 등록하여 항상 동작)
        $(document).on('hola:contextChange', function() {
            var newPropertyId = HolaPms.context.getPropertyId();
            if (newPropertyId) {
                $('#contextAlert').addClass('d-none');
                $('#dailyTableCard').show();
                if (!ReservationDaily.dataTable) {
                    ReservationDaily.init(newPropertyId, date);
                } else {
                    ReservationDaily.reload();
                }
            } else {
                $('#contextAlert').removeClass('d-none');
                $('#dailyTableCard').hide();
            }
        });
    });
    </script>
</th:block>
</body>
</html>
