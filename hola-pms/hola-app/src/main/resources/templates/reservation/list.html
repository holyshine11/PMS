<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>예약 관리</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-calendar-check me-2"></i>예약 관리</h4>
    </div>

    <!-- 프로퍼티 미선택 알림 -->
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <!-- 검색/필터 카드 -->
    <div class="card border-0 shadow-sm mb-3" id="searchCard" style="display:none;">
        <div class="card-body py-3">
            <div class="row g-2 align-items-center">
                <!-- 상태 필터 -->
                <div class="col-auto">
                    <select class="form-select form-select-sm" id="statusFilter">
                        <option value="">전체 상태</option>
                        <option value="RESERVED">예약</option>
                        <option value="CHECK_IN">체크인</option>
                        <option value="INHOUSE">투숙중</option>
                        <option value="CHECKED_OUT">체크아웃</option>
                        <option value="CANCELED">취소</option>
                        <option value="NO_SHOW">노쇼</option>
                    </select>
                </div>

                <!-- 키워드 검색 -->
                <div class="col-auto">
                    <input type="text" class="form-control form-control-sm" id="keyword"
                           placeholder="예약번호/이름/전화번호">
                </div>

                <!-- 검색 버튼 -->
                <div class="col-auto">
                    <button class="btn btn-primary btn-sm" id="searchBtn">
                        <i class="fas fa-search me-1"></i>검색
                    </button>
                </div>

                <!-- 테이블뷰 기간 프리셋 (테이블뷰 활성 시만 표시) -->
                <div class="col-auto" id="tablePeriodGroup" style="display:none;">
                    <div class="btn-group btn-group-sm" role="group">
                        <button class="btn btn-outline-secondary active" data-period="3">3개월</button>
                        <button class="btn btn-outline-secondary" data-period="6">6개월</button>
                        <button class="btn btn-outline-secondary" data-period="12">1년</button>
                    </div>
                </div>

                <!-- 뷰 토글 + 신규 등록 (오른쪽) -->
                <div class="col-auto ms-auto">
                    <div class="btn-group btn-group-sm" role="group">
                        <button class="btn btn-outline-primary active" id="calendarViewBtn">
                            <i class="fas fa-calendar-alt me-1"></i>캘린더
                        </button>
                        <button class="btn btn-outline-primary" id="tableViewBtn">
                            <i class="fas fa-list me-1"></i>테이블
                        </button>
                    </div>
                </div>
                <div class="col-auto">
                    <a href="/admin/reservations/new" class="btn btn-primary btn-sm">
                        <i class="fas fa-plus me-1"></i>신규 예약
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 캘린더뷰 컨테이너 -->
    <div id="calendarViewContainer" style="display:none;">
        <!-- JS에서 동적 생성 -->
    </div>

    <!-- 테이블뷰 컨테이너 -->
    <div id="tableViewContainer" class="card border-0 shadow-sm" style="display:none;">
        <div class="card-body">
            <table id="reservationTable" class="table table-hover mb-0" style="width:100%">
                <thead class="table-light">
                <tr>
                    <th>예약번호</th>
                    <th>확인번호</th>
                    <th>상태</th>
                    <th>예약자</th>
                    <th>전화번호</th>
                    <th>체크인</th>
                    <th>체크아웃</th>
                    <th>OTA</th>
                    <th>등록일시</th>
                    <th style="width:80px">관리</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/reservation-calendar-view.js}"></script>
    <script th:src="@{/js/reservation-table-view.js}"></script>
    <script>
    $(function() {
        var viewsInitialized = false;
        var currentPeriod = 3; // 테이블뷰 기본 기간 (개월)

        // 컨텍스트 변경 이벤트 (항상 바인딩)
        $(document).on('hola:contextChange', function(e, ctx) {
            var pid = ctx && ctx.propertyId ? ctx.propertyId : HolaPms.context.getPropertyId();
            if (!pid) {
                $('#contextAlert').removeClass('d-none');
                $('#searchCard').hide();
                $('#calendarViewContainer').hide();
                $('#tableViewContainer').hide();
                return;
            }
            $('#contextAlert').addClass('d-none');
            $('#searchCard').show();

            if (!viewsInitialized) {
                initViews(pid);
            } else {
                ReservationCalendarView.propertyId = pid;
                ReservationTableView.propertyId = pid;

                if ($('#calendarViewContainer').is(':visible')) {
                    ReservationCalendarView.load(getSearchParams());
                }
                if ($('#tableViewContainer').is(':visible')) {
                    ReservationTableView.reload(getTableSearchParams());
                }
            }
        });

        // 뷰 토글: 캘린더뷰
        $('#calendarViewBtn').on('click', function() {
            $(this).addClass('active');
            $('#tableViewBtn').removeClass('active');
            $('#calendarViewContainer').show();
            $('#tableViewContainer').hide();
            $('#tablePeriodGroup').hide();
            ReservationCalendarView.load(getSearchParams());
        });

        // 뷰 토글: 테이블뷰
        $('#tableViewBtn').on('click', function() {
            $(this).addClass('active');
            $('#calendarViewBtn').removeClass('active');
            $('#tableViewContainer').show();
            $('#calendarViewContainer').hide();
            $('#tablePeriodGroup').show();

            // 캘린더의 현재 월을 테이블 기간의 기준으로 동기화
            var calMonth = ReservationCalendarView.getCurrentMonthRange();
            if (calMonth) {
                syncTableFromCalendar(calMonth.year, calMonth.month);
            }

            ReservationTableView.reload(getTableSearchParams());
        });

        // 테이블뷰 기간 프리셋
        $('#tablePeriodGroup').on('click', 'button[data-period]', function() {
            $('#tablePeriodGroup button').removeClass('active');
            $(this).addClass('active');
            currentPeriod = parseInt($(this).data('period'));
            ReservationTableView.reload(getTableSearchParams());
        });

        // 검색 버튼
        $('#searchBtn').on('click', function() {
            doSearch();
        });

        // 키워드 엔터 키
        $('#keyword').on('keypress', function(e) {
            if (e.which === 13) { doSearch(); }
        });

        // 초기 프로퍼티 컨텍스트 체크
        var propertyId = HolaPms.context.getPropertyId();
        if (!propertyId) {
            $('#contextAlert').removeClass('d-none');
            return;
        }
        $('#searchCard').show();
        initViews(propertyId);

        /**
         * 뷰 초기화
         */
        function initViews(pid) {
            ReservationCalendarView.init(pid);
            $('#calendarViewContainer').show();

            ReservationTableView.init(pid);
            viewsInitialized = true;
        }

        /**
         * 검색 파라미터 조립 (캘린더뷰용)
         */
        function getSearchParams() {
            return {
                status: $('#statusFilter').val(),
                keyword: $.trim($('#keyword').val())
            };
        }

        /**
         * 테이블뷰 검색 파라미터 (기간 프리셋 포함)
         */
        function getTableSearchParams() {
            var now = new Date();
            var checkInFrom = new Date(now.getFullYear(), now.getMonth(), 1);
            var checkInTo = new Date(now.getFullYear(), now.getMonth() + currentPeriod, 0);

            return {
                status: $('#statusFilter').val(),
                keyword: $.trim($('#keyword').val()),
                checkInFrom: formatDate(checkInFrom),
                checkInTo: formatDate(checkInTo)
            };
        }

        /**
         * 캘린더 월 기준으로 테이블 기간 동기화
         */
        function syncTableFromCalendar(year, month) {
            // 캘린더에서 보던 월의 1일부터 기간 프리셋만큼
            // (별도 상태 저장 없이, getTableSearchParams에서 currentPeriod 사용)
        }

        /**
         * 검색 실행 (현재 활성 뷰에 따라 분기)
         */
        function doSearch() {
            if ($('#calendarViewContainer').is(':visible')) {
                ReservationCalendarView.load(getSearchParams());
            }
            if ($('#tableViewContainer').is(':visible')) {
                ReservationTableView.reload(getTableSearchParams());
            }
        }

        /**
         * 날짜 포맷 헬퍼
         */
        function formatDate(d) {
            var yyyy = d.getFullYear();
            var mm = String(d.getMonth() + 1).padStart(2, '0');
            var dd = String(d.getDate()).padStart(2, '0');
            return yyyy + '-' + mm + '-' + dd;
        }
    });
    </script>
</th:block>
</body>
</html>
