<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>예약 관리</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Row 1: 타이틀 + 뷰 토글 + 신규 예약 -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h4 class="fw-bold mb-0"><i class="fas fa-calendar-check me-2"></i>예약 관리</h4>
        <div id="viewToggleGroup" class="d-flex align-items-center gap-2 d-none">
            <div class="btn-group btn-group-sm" role="group">
                <button class="btn btn-outline-primary active" id="timelineViewBtn">
                    <i class="fas fa-grip-lines me-1"></i>타임라인
                </button>
                <button class="btn btn-outline-primary" id="calendarViewBtn">
                    <i class="fas fa-calendar-alt me-1"></i>캘린더
                </button>
                <button class="btn btn-outline-primary" id="tableViewBtn">
                    <i class="fas fa-list me-1"></i>테이블
                </button>
            </div>
            <a href="/admin/reservations/new" class="btn btn-primary btn-sm">
                <i class="fas fa-plus me-1"></i>신규 예약
            </a>
        </div>
    </div>

    <!-- 프로퍼티 미선택 알림 -->
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <!-- Row 2: 상태 필터 + 키워드 검색 + 기간 (한 줄) -->
    <div id="searchCard" class="d-none">
        <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
            <!-- 상태 필터 버튼 -->
            <div class="d-flex flex-wrap gap-1" id="statusFilterGroup">
                <button class="btn btn-sm status-filter-btn active" data-status="">전체</button>
                <button class="btn btn-sm status-filter-btn" data-status="RESERVED">예약</button>
                <button class="btn btn-sm status-filter-btn" data-status="INHOUSE">투숙중</button>
                <button class="btn btn-sm status-filter-btn" data-status="CHECKED_OUT">체크아웃</button>
                <button class="btn btn-sm status-filter-btn" data-status="CANCELED">취소</button>
                <button class="btn btn-sm status-filter-btn" data-status="NO_SHOW">노쇼</button>
            </div>

            <span class="border-start divider-v"></span>

            <!-- 키워드 검색 -->
            <input type="text" class="form-control form-control-sm" id="keyword"
                   placeholder="예약번호/이름/전화번호" style="min-width:120px; max-width:200px; flex:1;">
            <button class="btn btn-primary btn-sm" id="searchBtn">
                <i class="fas fa-search me-1"></i>검색
            </button>
            <button class="btn btn-outline-secondary btn-sm" id="resetBtn">
                <i class="fas fa-undo me-1"></i>초기화
            </button>

            <!-- 테이블뷰 기간 선택 (테이블뷰 활성 시만 표시) -->
            <div class="d-flex align-items-center gap-2 d-none" id="tablePeriodGroup">
                <span class="border-start divider-v"></span>
                <input type="date" class="form-control form-control-sm" id="searchDateFrom" style="min-width:120px; max-width:160px; flex:1;">
                <span class="text-muted">~</span>
                <input type="date" class="form-control form-control-sm" id="searchDateTo" style="min-width:120px; max-width:160px; flex:1;">
                <div class="btn-group btn-group-sm" role="group">
                    <button class="btn btn-outline-secondary active" data-period="3">3개월</button>
                    <button class="btn btn-outline-secondary" data-period="6">6개월</button>
                    <button class="btn btn-outline-secondary" data-period="12">1년</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 타임라인뷰 컨테이너 -->
    <div id="timelineViewContainer" class="d-none">
        <!-- JS에서 동적 생성 -->
    </div>

    <!-- 캘린더뷰 컨테이너 -->
    <div id="calendarViewContainer" class="d-none">
        <!-- JS에서 동적 생성 -->
    </div>

    <!-- 테이블뷰 컨테이너 -->
    <div id="tableViewContainer" class="card border-0 shadow-sm d-none">
        <div class="card-body">
            <table id="reservationTable" class="table table-hover mb-0" style="width:100%">
                <thead class="table-light">
                <tr>
                    <th>예약번호</th>
                    <th>확인번호</th>
                    <th>상태</th>
                    <th>예약자</th>
                    <th>전화번호</th>
                    <th>체크인</th>
                    <th>체크아웃</th>
                    <th>OTA</th>
                    <th>등록일시</th>
                    <th style="width:80px">관리</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/reservation-timeline-view.js}"></script>
    <script th:src="@{/js/reservation-calendar-view.js}"></script>
    <script th:src="@{/js/reservation-table-view.js}"></script>
    <script>
    $(function() {
        var viewsInitialized = false;

        // 컨텍스트 변경 이벤트 (항상 바인딩)
        $(document).on('hola:contextChange', function(e, ctx) {
            var pid = ctx && ctx.propertyId ? ctx.propertyId : HolaPms.context.getPropertyId();
            if (!pid) {
                $('#contextAlert').removeClass('d-none');
                $('#searchCard').addClass('d-none');
                $('#viewToggleGroup').addClass('d-none');
                $('#timelineViewContainer').addClass('d-none');
                $('#calendarViewContainer').addClass('d-none');
                $('#tableViewContainer').addClass('d-none');
                return;
            }
            $('#contextAlert').addClass('d-none');
            $('#searchCard').removeClass('d-none');
            $('#viewToggleGroup').removeClass('d-none');

            if (!viewsInitialized) {
                initViews(pid);
            } else {
                ReservationTimelineView.propertyId = pid;
                ReservationCalendarView.propertyId = pid;
                ReservationTableView.propertyId = pid;

                // 호텔 변경으로 숨겨진 경우 활성 뷰 컨테이너 복원
                showActiveView();

                if ($('#timelineViewContainer').is(':visible')) {
                    ReservationTimelineView.loadToday(getSearchParams());
                }
                if ($('#calendarViewContainer').is(':visible')) {
                    ReservationCalendarView.load(getSearchParams());
                }
                if ($('#tableViewContainer').is(':visible')) {
                    ReservationTableView.reload(getTableSearchParams());
                }
            }
        });

        // 뷰 토글: 타임라인뷰
        $('#timelineViewBtn').on('click', function() {
            $('#timelineViewBtn, #calendarViewBtn, #tableViewBtn').removeClass('active');
            $(this).addClass('active');
            $('#timelineViewContainer').removeClass('d-none');
            $('#calendarViewContainer').addClass('d-none');
            $('#tableViewContainer').addClass('d-none');
            $('#tablePeriodGroup').addClass('d-none');
            ReservationTimelineView.loadToday(getSearchParams());
        });

        // 뷰 토글: 캘린더뷰
        $('#calendarViewBtn').on('click', function() {
            $('#timelineViewBtn, #calendarViewBtn, #tableViewBtn').removeClass('active');
            $(this).addClass('active');
            $('#timelineViewContainer').addClass('d-none');
            $('#calendarViewContainer').removeClass('d-none');
            $('#tableViewContainer').addClass('d-none');
            $('#tablePeriodGroup').addClass('d-none');
            ReservationCalendarView.load(getSearchParams());
        });

        // 뷰 토글: 테이블뷰
        $('#tableViewBtn').on('click', function() {
            $('#timelineViewBtn, #calendarViewBtn, #tableViewBtn').removeClass('active');
            $(this).addClass('active');
            $('#timelineViewContainer').addClass('d-none');
            $('#tableViewContainer').removeClass('d-none');
            $('#calendarViewContainer').addClass('d-none');
            $('#tablePeriodGroup').removeClass('d-none');

            // 날짜 미설정 시 기본 3개월
            if (!$('#searchDateFrom').val()) {
                setDatePeriod(3);
                $('#tablePeriodGroup button[data-period]').removeClass('active');
                $('#tablePeriodGroup button[data-period="3"]').addClass('active');
            }

            ReservationTableView.reload(getTableSearchParams());
        });

        // 테이블뷰 기간 프리셋
        $('#tablePeriodGroup').on('click', 'button[data-period]', function() {
            $('#tablePeriodGroup button[data-period]').removeClass('active');
            $(this).addClass('active');
            setDatePeriod(parseInt($(this).data('period')));
            ReservationTableView.reload(getTableSearchParams());
        });

        // 날짜 직접 변경 시 프리셋 해제 + 재검색
        $('#searchDateFrom, #searchDateTo').on('change', function() {
            $('#tablePeriodGroup button[data-period]').removeClass('active');
            if ($('#tableViewContainer').is(':visible')) {
                ReservationTableView.reload(getTableSearchParams());
            }
        });

        // 상태 필터 버튼 클릭
        $('#statusFilterGroup').on('click', 'button[data-status]', function() {
            $('#statusFilterGroup button').removeClass('active');
            $(this).addClass('active');
            doSearch();
        });

        // 검색 버튼
        $('#searchBtn').on('click', function() {
            doSearch();
        });

        // 초기화 버튼
        $('#resetBtn').on('click', function() {
            $('#statusFilterGroup button').removeClass('active');
            var $all = $('#statusFilterGroup button[data-status=""]');
            $all.addClass('active');
            $('#keyword').val('');
            // 기간 초기화 (과거 3개월)
            if (!$('#tablePeriodGroup').hasClass('d-none')) {
                $('#tablePeriodGroup button[data-period]').removeClass('active');
                $('#tablePeriodGroup button[data-period="3"]').addClass('active');
                setDatePeriod(3);
            }
            doSearch();
        });

        // 키워드 엔터 키
        $('#keyword').on('keypress', function(e) {
            if (e.which === 13) { doSearch(); }
        });

        // 초기 프로퍼티 컨텍스트 체크
        var propertyId = HolaPms.context.getPropertyId();
        if (!propertyId) {
            $('#contextAlert').removeClass('d-none');
            return;
        }
        $('#searchCard').removeClass('d-none');
        $('#viewToggleGroup').removeClass('d-none');
        initViews(propertyId);

        /**
         * 뷰 초기화
         */
        function initViews(pid) {
            // 디폴트: 타임라인 뷰 — show 먼저 해서 calcDayWidth가 정확하도록
            $('#timelineViewContainer').removeClass('d-none');
            ReservationTimelineView.init(pid);
            ReservationCalendarView.init(pid);
            ReservationTableView.init(pid);
            viewsInitialized = true;
        }

        /**
         * 현재 활성 뷰 버튼에 맞는 컨테이너 표시 (호텔 변경으로 숨겨진 경우 복원)
         */
        function showActiveView() {
            var isTimeline = $('#timelineViewBtn').hasClass('active');
            var isCalendar = $('#calendarViewBtn').hasClass('active');
            var isTable = $('#tableViewBtn').hasClass('active');

            // 아무 뷰도 active 아닌 경우 타임라인을 기본으로
            if (!isTimeline && !isCalendar && !isTable) {
                isTimeline = true;
                $('#timelineViewBtn').addClass('active');
            }

            $('#timelineViewContainer').toggleClass('d-none', !isTimeline);
            $('#calendarViewContainer').toggleClass('d-none', !isCalendar);
            $('#tableViewContainer').toggleClass('d-none', !isTable);
            $('#tablePeriodGroup').toggleClass('d-none', !isTable);
        }

        /**
         * 검색 파라미터 조립 (캘린더뷰용)
         */
        function getSearchParams() {
            return {
                status: $('#statusFilterGroup button.active').data('status'),
                keyword: $.trim($('#keyword').val())
            };
        }

        /**
         * 테이블뷰 검색 파라미터 (날짜 입력 기반)
         */
        function getTableSearchParams() {
            return {
                status: $('#statusFilterGroup button.active').data('status'),
                keyword: $.trim($('#keyword').val()),
                checkInFrom: $('#searchDateFrom').val(),
                checkInTo: $('#searchDateTo').val()
            };
        }

        /**
         * 기간 프리셋으로 날짜 입력 설정 (오늘 기준 과거 N개월 ~ 오늘)
         */
        function setDatePeriod(months) {
            var now = new Date();
            var from = new Date(now.getFullYear(), now.getMonth() - months, now.getDate());
            $('#searchDateFrom').val(formatDate(from));
            $('#searchDateTo').val(formatDate(now));
        }

        function formatDate(d) {
            var yyyy = d.getFullYear();
            var mm = String(d.getMonth() + 1).padStart(2, '0');
            var dd = String(d.getDate()).padStart(2, '0');
            return yyyy + '-' + mm + '-' + dd;
        }

        /**
         * 검색 실행 (현재 활성 뷰에 따라 분기)
         */
        function doSearch() {
            if ($('#timelineViewContainer').is(':visible')) {
                var params = getSearchParams();
                if (params.keyword) {
                    ReservationTimelineView.searchAndNavigate(params);
                } else {
                    ReservationTimelineView.loadToday(params);
                }
            }
            if ($('#calendarViewContainer').is(':visible')) {
                var params = getSearchParams();
                if (params.keyword) {
                    ReservationCalendarView.searchAndNavigate(params);
                } else {
                    ReservationCalendarView.load(params);
                }
            }
            if ($('#tableViewContainer').is(':visible')) {
                ReservationTableView.reload(getTableSearchParams());
            }
        }

    });
    </script>
</th:block>
</body>
</html>
