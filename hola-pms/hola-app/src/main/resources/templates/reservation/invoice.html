<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invoice</title>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css");
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Pretendard", -apple-system, sans-serif; font-size: 12px; color: #333; padding: 40px; line-height: 1.5; }
        .invoice-container { max-width: 800px; margin: 0 auto; }

        /* 헤더 */
        .invoice-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid #051923; padding-bottom: 20px; margin-bottom: 24px; }
        .hotel-info { flex: 1; }
        .hotel-name { font-size: 22px; font-weight: 700; color: #051923; margin-bottom: 4px; }
        .hotel-detail { font-size: 11px; color: #666; line-height: 1.6; }
        .invoice-title-area { text-align: right; }
        .invoice-title { font-size: 28px; font-weight: 800; color: #003554; letter-spacing: 2px; }
        .invoice-logo { margin-bottom: 8px; text-align: right; }

        /* 정보 그리드 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .info-box { background: #f8f9fa; border-radius: 6px; padding: 16px; }
        .info-box-title { font-size: 11px; font-weight: 700; color: #003554; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid #dee2e6; padding-bottom: 6px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .info-label { color: #888; font-size: 11px; }
        .info-value { font-weight: 500; font-size: 11px; }

        /* 요금 테이블 */
        .charge-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .charge-table th { background: #051923; color: #fff; padding: 8px 12px; font-size: 11px; font-weight: 600; }
        .charge-table td { padding: 6px 12px; border-bottom: 1px solid #eee; font-size: 11px; }
        .charge-table .section-header td { background: #f0f4f8; font-weight: 600; color: #003554; font-size: 11px; padding: 6px 12px; }
        .charge-table .indent { padding-left: 28px; }
        .text-end { text-align: right; }
        .text-center { text-align: center; }
        .text-line-through { text-decoration: line-through; color: #999; }

        /* 합계 영역 */
        .summary-area { display: flex; justify-content: flex-end; margin-bottom: 24px; }
        .summary-box { width: 320px; }
        .summary-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; }
        .summary-row.subtotal { border-top: 1px solid #dee2e6; margin-top: 4px; padding-top: 8px; }
        .summary-row.grand-total { background: #051923; color: #fff; padding: 10px 16px; border-radius: 4px; font-size: 14px; font-weight: 700; margin-top: 8px; }
        .summary-row.paid { color: #0582CA; font-weight: 600; }
        .summary-row.balance { color: #EF476F; font-weight: 700; font-size: 13px; }

        /* 결제 이력 */
        .section-title { font-size: 13px; font-weight: 700; color: #003554; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 2px solid #003554; }
        .txn-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .txn-table th { background: #f0f4f8; padding: 6px 10px; font-size: 11px; font-weight: 600; color: #003554; border-bottom: 1px solid #dee2e6; }
        .txn-table td { padding: 6px 10px; font-size: 11px; border-bottom: 1px solid #eee; }

        /* 서명 */
        .signature-area { margin-top: 40px; display: flex; justify-content: space-between; }
        .sig-box { width: 45%; text-align: center; }
        .sig-line { border-top: 1px solid #333; margin-top: 60px; padding-top: 8px; font-size: 11px; color: #666; }

        /* 푸터 */
        .invoice-footer { margin-top: 40px; text-align: center; font-size: 10px; color: #aaa; border-top: 1px solid #eee; padding-top: 16px; }

        /* 로딩 */
        .loading-overlay { display: flex; justify-content: center; align-items: center; min-height: 300px; }

        /* 프린트 */
        @media print { body { padding: 20px; } .no-print { display: none !important; } @page { margin: 15mm; } }
        .print-bar { position: sticky; top: 0; background: #fff; padding: 12px 0; text-align: right; border-bottom: 1px solid #eee; margin-bottom: 20px; z-index: 10; }
        .print-btn { padding: 8px 20px; background: #003554; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-family: "Pretendard", sans-serif; }
        .print-btn:hover { background: #051923; }
    </style>
</head>
<body>
    <!-- 인쇄 버튼 바 -->
    <div class="print-bar no-print">
        <button class="print-btn" onclick="window.print()">인쇄</button>
    </div>

    <div class="invoice-container">
        <!-- 로딩 -->
        <div id="invoiceLoading" class="loading-overlay">
            <span style="color:#999;">인보이스 로딩 중...</span>
        </div>

        <!-- 인보이스 본문 (JS가 데이터 로드 후 표시) -->
        <div id="invoiceContent" style="display:none;">

            <!-- 헤더 -->
            <div class="invoice-header">
                <div class="hotel-info">
                    <div class="hotel-name" id="ivHotelName"></div>
                    <div class="hotel-detail" id="ivHotelDetail"></div>
                </div>
                <div class="invoice-title-area">
                    <div id="ivLogoArea" class="invoice-logo"></div>
                    <div class="invoice-title">INVOICE</div>
                </div>
            </div>

            <!-- 정보 그리드 -->
            <div class="info-grid">
                <div class="info-box">
                    <div class="info-box-title">Guest Information</div>
                    <div id="ivGuestInfo"></div>
                </div>
                <div class="info-box">
                    <div class="info-box-title">Reservation Details</div>
                    <div id="ivReservationInfo"></div>
                </div>
            </div>

            <!-- 요금 명세 -->
            <div class="section-title">Charge Details / 요금 명세</div>
            <table class="charge-table">
                <thead>
                    <tr>
                        <th style="text-align:left">항목</th>
                        <th style="text-align:right">공급가</th>
                        <th style="text-align:right">세액</th>
                        <th style="text-align:right">소계</th>
                    </tr>
                </thead>
                <tbody id="ivChargeRows"></tbody>
            </table>

            <!-- 합계 영역 -->
            <div class="summary-area">
                <div class="summary-box" id="ivSummaryBox"></div>
            </div>

            <!-- 결제 이력 -->
            <div id="ivPaymentHistory"></div>

            <!-- 서명 영역 -->
            <div class="signature-area">
                <div class="sig-box">
                    <div class="sig-line">Guest Signature / 투숙객 서명</div>
                </div>
                <div class="sig-box">
                    <div class="sig-line">Hotel Authorized / 호텔 담당자</div>
                </div>
            </div>

            <!-- 푸터 -->
            <div class="invoice-footer" id="ivFooter"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/js/hola-common.js"></script>
    <script th:inline="javascript">
    $(function() {
        var propertyId = /*[[${propertyId}]]*/ 0;
        var reservationId = /*[[${reservationId}]]*/ 0;

        var resData = null, payData = null, propData = null;
        var loaded = 0;

        function onAllLoaded() {
            if (loaded < 3) return;
            try {
                renderInvoice(propData, resData, payData);
            } catch (e) {
                var msg = e.message === 'NO_DATA' ? '예약 정보를 불러올 수 없습니다.' : '인보이스 렌더링 중 오류가 발생했습니다.';
                $('#invoiceLoading').html('<span style="color:#c00;">' + msg + '</span>');
                return;
            }
            $('#invoiceLoading').hide();
            $('#invoiceContent').show();
        }

        // 예약 정보
        HolaPms.ajax({
            url: '/api/v1/properties/' + propertyId + '/reservations/' + reservationId,
            type: 'GET',
            success: function(res) { if (res.success) resData = res.data; loaded++; onAllLoaded(); },
            error: function() { loaded++; onAllLoaded(); }
        });

        // 결제 정보
        HolaPms.ajax({
            url: '/api/v1/properties/' + propertyId + '/reservations/' + reservationId + '/payment',
            type: 'GET',
            success: function(res) { if (res.success) payData = res.data; loaded++; onAllLoaded(); },
            error: function() { loaded++; onAllLoaded(); }
        });

        // 프로퍼티 정보
        HolaPms.ajax({
            url: '/api/v1/properties/' + propertyId,
            type: 'GET',
            success: function(res) { if (res.success) propData = res.data; loaded++; onAllLoaded(); },
            error: function() { loaded++; onAllLoaded(); }
        });

        function renderInvoice(property, resData, payData) {
            if (!resData) throw new Error('NO_DATA');

            var esc = HolaPms.escapeHtml;
            var fmt = function(v) { return v != null ? Number(v).toLocaleString() : '0'; };

            // 프로퍼티
            var hotelName = (property && property.propertyName) || 'Hotel';
            var hotelAddr = property ? ((property.address || '') + (property.addressDetail ? ' ' + property.addressDetail : '')) : '';
            var hotelPhone = (property && property.phone) || '';
            var hotelEmail = (property && property.email) || '';
            var bizNumber = (property && property.businessNumber) || '';
            var repName = (property && property.representativeName) || '';
            var logoPath = (property && property.logoPath) || '';

            $('#ivHotelName').text(hotelName);
            var detailHtml = '';
            if (hotelAddr) detailHtml += esc(hotelAddr) + '<br>';
            if (hotelPhone) detailHtml += 'TEL: ' + esc(hotelPhone);
            if (hotelEmail) detailHtml += (hotelPhone ? ' &nbsp;|&nbsp; ' : '') + 'EMAIL: ' + esc(hotelEmail);
            if (bizNumber) detailHtml += '<br>사업자등록번호: ' + esc(bizNumber);
            if (repName) detailHtml += (bizNumber ? ' &nbsp;|&nbsp; ' : '<br>') + '대표: ' + esc(repName);
            $('#ivHotelDetail').html(detailHtml);

            if (logoPath) {
                $('#ivLogoArea').html('<img src="' + window.location.origin + logoPath + '" alt="Hotel Logo" style="max-height:60px; max-width:200px; object-fit:contain;">');
            }

            // 게스트 정보
            var guestHtml = '';
            guestHtml += '<div class="info-row"><span class="info-label">성명</span><span class="info-value">' + esc(resData.guestNameKo || '-') + '</span></div>';
            var guestPhone = '';
            if (resData.phoneCountryCode && resData.phoneNumber) guestPhone = resData.phoneCountryCode + ' ' + resData.phoneNumber;
            else if (resData.phoneNumber) guestPhone = resData.phoneNumber;
            if (guestPhone) guestHtml += '<div class="info-row"><span class="info-label">연락처</span><span class="info-value">' + esc(guestPhone) + '</span></div>';
            if (resData.email) guestHtml += '<div class="info-row"><span class="info-label">이메일</span><span class="info-value">' + esc(resData.email) + '</span></div>';
            $('#ivGuestInfo').html(guestHtml);

            // 예약 정보
            var nights = 0;
            if (resData.masterCheckIn && resData.masterCheckOut) {
                nights = Math.round((new Date(resData.masterCheckOut) - new Date(resData.masterCheckIn)) / 86400000);
            }
            var subs = resData.subReservations || [];
            var roomTypes = [];
            subs.forEach(function(s) { if (s.roomReservationStatus !== 'CANCELED' && s.roomTypeName) roomTypes.push(s.roomTypeName); });
            var today = new Date();
            var issueDate = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

            var rsvHtml = '';
            rsvHtml += '<div class="info-row"><span class="info-label">예약번호</span><span class="info-value">' + esc(resData.masterReservationNo || '-') + '</span></div>';
            rsvHtml += '<div class="info-row"><span class="info-label">확인번호</span><span class="info-value">' + esc(resData.confirmationNo || '-') + '</span></div>';
            rsvHtml += '<div class="info-row"><span class="info-label">체크인</span><span class="info-value">' + (resData.masterCheckIn || '-') + '</span></div>';
            rsvHtml += '<div class="info-row"><span class="info-label">체크아웃</span><span class="info-value">' + (resData.masterCheckOut || '-') + '</span></div>';
            rsvHtml += '<div class="info-row"><span class="info-label">숙박일수</span><span class="info-value">' + nights + '박</span></div>';
            rsvHtml += '<div class="info-row"><span class="info-label">객실타입</span><span class="info-value">' + esc(roomTypes.join(', ') || '-') + '</span></div>';
            rsvHtml += '<div class="info-row"><span class="info-label">발행일</span><span class="info-value">' + issueDate + '</span></div>';
            $('#ivReservationInfo').html(rsvHtml);

            // 요금 명세
            var chargeRows = '';
            var totalSupply = 0, totalTax = 0, totalSvcChg = 0;

            subs.forEach(function(sub, idx) {
                var isCanceled = sub.roomReservationStatus === 'CANCELED';
                var charges = sub.dailyCharges || [];
                if (charges.length === 0) return;
                var label = sub.roomTypeName || ('객실 #' + (idx + 1));
                if (subs.length > 1) label = 'Leg #' + (idx + 1) + ' - ' + label;
                var cancelSuffix = isCanceled ? ' [취소됨]' : '';

                chargeRows += '<tr class="section-header"><td colspan="4">' + esc(label + cancelSuffix) + '</td></tr>';
                charges.forEach(function(c) {
                    var sp = Number(c.supplyPrice) || 0, tx = Number(c.tax) || 0, sc = Number(c.serviceCharge) || 0;
                    if (!isCanceled) { totalSupply += sp; totalTax += tx; totalSvcChg += sc; }
                    chargeRows += '<tr' + (isCanceled ? ' class="text-line-through"' : '') + '>'
                        + '<td class="indent">' + c.chargeDate + '</td>'
                        + '<td class="text-end">' + fmt(sp) + '</td>'
                        + '<td class="text-end">' + fmt(tx) + '</td>'
                        + '<td class="text-end">' + fmt(sp + tx) + '</td></tr>';
                });
            });

            // 유료 서비스
            var paidSvcs = [];
            subs.forEach(function(sub) {
                var isCanceled = sub.roomReservationStatus === 'CANCELED';
                (sub.services || []).forEach(function(svc) {
                    if (Number(svc.totalPrice) > 0) paidSvcs.push({ svc: svc, canceled: isCanceled });
                });
            });
            if (paidSvcs.length > 0) {
                chargeRows += '<tr class="section-header"><td colspan="4">유료 서비스</td></tr>';
                paidSvcs.forEach(function(item) {
                    var s = item.svc, ic = item.canceled;
                    var sLabel = s.serviceName || (s.serviceOptionId ? '서비스 #' + s.serviceOptionId : '객실 업그레이드');
                    if (s.serviceDate) sLabel += ' (' + s.serviceDate + ')';
                    var unitP = Number(s.unitPrice) || 0, qty = s.quantity || 1, sTax = Number(s.tax) || 0, sTotal = Number(s.totalPrice) || 0;
                    if (!ic) { totalSupply += unitP * qty; totalTax += sTax; }
                    chargeRows += '<tr' + (ic ? ' class="text-line-through"' : '') + '>'
                        + '<td class="indent">' + esc(sLabel) + ' x' + qty + '</td>'
                        + '<td class="text-end">' + fmt(unitP * qty) + '</td>'
                        + '<td class="text-end">' + fmt(sTax) + '</td>'
                        + '<td class="text-end">' + fmt(sTotal) + '</td></tr>';
                });
            }

            // 봉사료
            if (totalSvcChg > 0) {
                chargeRows += '<tr class="section-header"><td colspan="4">봉사료</td></tr>';
                chargeRows += '<tr><td class="indent">봉사료 합계</td><td class="text-end" colspan="2"></td><td class="text-end">' + fmt(totalSvcChg) + '</td></tr>';
            }

            // 얼리/레이트, 조정
            var earlyLateFee = payData ? Number(payData.totalEarlyLateFee) || 0 : 0;
            if (earlyLateFee > 0) {
                chargeRows += '<tr><td>얼리체크인/레이트체크아웃</td><td class="text-end" colspan="2"></td><td class="text-end">' + fmt(earlyLateFee) + '</td></tr>';
            }
            var adjAmount = payData ? Number(payData.totalAdjustmentAmount) || 0 : 0;
            if (adjAmount !== 0) {
                chargeRows += '<tr><td>금액 조정</td><td class="text-end" colspan="2"></td><td class="text-end">' + fmt(adjAmount) + '</td></tr>';
            }

            $('#ivChargeRows').html(chargeRows);

            // 합계
            var grandTotal = payData ? Number(payData.grandTotal) || 0 : 0;
            var totalPaid = payData ? Number(payData.totalPaidAmount) || 0 : 0;
            var remaining = payData ? Number(payData.remainingAmount) || 0 : 0;

            var sumHtml = '';
            sumHtml += '<div class="summary-row subtotal"><span>공급가 합계</span><span>' + fmt(totalSupply) + '원</span></div>';
            sumHtml += '<div class="summary-row"><span>세액 합계</span><span>' + fmt(totalTax) + '원</span></div>';
            if (totalSvcChg > 0) sumHtml += '<div class="summary-row"><span>봉사료 합계</span><span>' + fmt(totalSvcChg) + '원</span></div>';
            sumHtml += '<div class="summary-row grand-total"><span>총 청구 금액</span><span>' + fmt(grandTotal) + '원</span></div>';
            if (totalPaid > 0) sumHtml += '<div class="summary-row paid"><span>결제 완료</span><span>' + fmt(totalPaid) + '원</span></div>';
            if (remaining > 0) sumHtml += '<div class="summary-row balance"><span>잔액</span><span>' + fmt(remaining) + '원</span></div>';
            $('#ivSummaryBox').html(sumHtml);

            // 결제 이력
            var txns = (payData && payData.transactions) || [];
            var methodLabels = { CARD: '카드', CASH: '현금' };
            var typeLabels = { PAYMENT: '결제', REFUND: '환불', CANCEL_FEE: '취소수수료' };
            if (txns.length > 0) {
                var txnHtml = '<div class="section-title">Payment History / 결제 이력</div>';
                txnHtml += '<table class="txn-table"><thead><tr><th>NO</th><th>유형</th><th>수단</th><th style="text-align:right">금액</th><th>일시</th></tr></thead><tbody>';
                txns.forEach(function(txn, i) {
                    var dt = txn.createdAt ? txn.createdAt.replace('T', ' ').substring(0, 16) : '-';
                    txnHtml += '<tr><td class="text-center">' + (i+1) + '</td>'
                        + '<td class="text-center">' + (typeLabels[txn.transactionType] || txn.transactionType) + '</td>'
                        + '<td class="text-center">' + (methodLabels[txn.paymentMethod] || txn.paymentMethod) + '</td>'
                        + '<td class="text-end">' + fmt(txn.amount) + '원</td>'
                        + '<td class="text-center">' + esc(dt) + '</td></tr>';
                });
                txnHtml += '</tbody></table>';
                $('#ivPaymentHistory').html(txnHtml);
            }

            // 푸터
            var footerHtml = esc(hotelName);
            if (hotelAddr) footerHtml += ' | ' + esc(hotelAddr);
            if (hotelPhone) footerHtml += ' | TEL ' + esc(hotelPhone);
            footerHtml += '<br>이용해 주셔서 감사합니다.';
            $('#ivFooter').html(footerHtml);

            // 타이틀
            document.title = 'Invoice - ' + (resData.masterReservationNo || '');
        }
    });
    </script>
</body>
</html>
