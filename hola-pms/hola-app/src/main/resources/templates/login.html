<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola PMS - 로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: linear-gradient(135deg, #003554 0%, #051923 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background-color: #0582CA;
            border-color: #0582CA;
        }
        .btn-primary:hover {
            background-color: #003554;
            border-color: #003554;
        }
        .text-primary {
            color: #0582CA !important;
        }
        .form-control:focus {
            border-color: #0582CA;
            box-shadow: 0 0 0 0.25rem rgba(5, 130, 202, 0.25);
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="fas fa-hotel fa-3x text-primary mb-3"></i>
                <h3 class="fw-bold">Hola PMS</h3>
                <p class="text-muted">호텔 프로퍼티 관리 시스템</p>
            </div>

            <!-- 에러 메시지 -->
            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-1"></i>아이디 또는 비밀번호가 일치하지 않습니다.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <!-- 로그아웃 메시지 -->
            <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-1"></i>로그아웃 되었습니다.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <!-- 하우스키퍼 안내 -->
            <div th:if="${param.hk}" class="alert alert-info alert-dismissible fade show" role="alert">
                <i class="fas fa-info-circle me-1"></i>하우스키핑 담당자는 <a th:href="@{/m/housekeeping/login}" class="alert-link">모바일 전용 페이지</a>에서 로그인해주세요.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">아이디</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="아이디를 입력하세요 (4자 이상)" minlength="4" maxlength="50" required autofocus>
                    </div>
                    <div class="invalid-feedback">아이디는 4자 이상 입력해주세요.</div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">비밀번호</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="비밀번호를 입력하세요"
                               minlength="8" maxlength="20" required>
                    </div>
                    <div class="invalid-feedback">비밀번호는 8~20자로 입력해주세요.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2" id="loginBtn">
                    <i class="fas fa-sign-in-alt me-1"></i>로그인
                </button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // 로그인 페이지 진입 시 이전 세션 컨텍스트 제거 (계정 간 데이터 유출 방지)
    sessionStorage.removeItem('selectedHotelId');
    sessionStorage.removeItem('selectedPropertyId');

    document.querySelector('form').addEventListener('submit', function(e) {
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var valid = true;

        // 아이디: 4자 이상
        if (username.length < 4) {
            document.getElementById('username').classList.add('is-invalid');
            valid = false;
        } else {
            document.getElementById('username').classList.remove('is-invalid');
        }

        // 비밀번호: 8~20자
        if (password.length < 8 || password.length > 20) {
            document.getElementById('password').classList.add('is-invalid');
            valid = false;
        } else {
            document.getElementById('password').classList.remove('is-invalid');
        }

        if (!valid) {
            e.preventDefault();
        }
    });
    </script>
</body>
</html>
