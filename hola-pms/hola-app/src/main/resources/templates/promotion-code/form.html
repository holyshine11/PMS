<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>프로모션 코드 관리</title>
</head>
<body>
<div layout:fragment="content">
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <h4 class="fw-bold mb-4"><i class="fas fa-percentage me-2"></i>프로모션 코드 관리</h4>

    <!-- 기본정보 -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold mb-0"><i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> 프로모션 코드 기본정보</h6>
                <small class="text-muted">"<span class="text-danger">*</span>"은 필수 입력 항목입니다.</small>
            </div>

            <!-- 호텔/프로퍼티명 -->
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">호텔/프로퍼티</label>
                <div class="col-sm-10">
                    <span id="hotelPropertyName" class="form-control-plaintext">-</span>
                </div>
            </div>

            <!-- 레이트 코드 -->
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label required">레이트 코드</label>
                <div class="col-sm-8">
                    <div class="d-flex align-items-center">
                        <input type="text" class="form-control me-2" id="rateCodeName" readonly
                               placeholder="레이트 코드를 입력하세요." style="max-width: 400px;">
                        <input type="hidden" id="rateCodeId">
                        <button type="button" class="btn btn-outline-primary btn-sm" id="btnRateCodeLookup"
                                onclick="PromotionCodeForm.openRateCodeModal()">조회</button>
                        <span class="ms-2" id="btnRateCodeChange" style="display:none;">
                            <button type="button" class="btn btn-outline-secondary btn-sm"
                                    onclick="PromotionCodeForm.openRateCodeModal()">수정</button>
                        </span>
                    </div>
                </div>
            </div>

            <!-- 프로모션 코드 + 중복확인 -->
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label required">프로모션 코드</label>
                <div class="col-sm-8">
                    <div class="d-flex align-items-center">
                        <input type="text" class="form-control me-2" id="promotionCode" maxlength="50"
                               placeholder="코드명을 입력하세요." style="max-width: 400px;">
                        <button type="button" class="btn btn-outline-primary btn-sm" id="btnCheckDuplicate"
                                onclick="PromotionCodeForm.checkDuplicate()">중복확인</button>
                        <span id="codeCheckResult" class="ms-2"></span>
                    </div>
                </div>
            </div>

            <!-- 프로모션 기간 -->
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label required">프로모션 기간</label>
                <div class="col-sm-6">
                    <div class="d-flex align-items-center">
                        <input type="date" class="form-control" id="promotionStartDate" style="max-width: 200px;">
                        <span class="mx-2">~</span>
                        <input type="date" class="form-control" id="promotionEndDate" style="max-width: 200px;">
                    </div>
                </div>
            </div>

            <!-- 설명 (국문) -->
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label required">설명</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control mb-2" id="descriptionKo" maxlength="500"
                           placeholder="국문 설명을 입력하세요">
                    <input type="text" class="form-control" id="descriptionEn" maxlength="500"
                           placeholder="영문 설명을 입력하세요">
                </div>
            </div>

            <!-- 타입 -->
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label required">타입</label>
                <div class="col-sm-4">
                    <select class="form-select" id="promotionType">
                        <option value="COMPANY">기업 프로모션</option>
                        <option value="PROMOTION">일반 프로모션</option>
                        <option value="OTA">OTA 프로모션</option>
                        <option value="PACKAGE">패키지</option>
                        <option value="SEASONAL">시즌</option>
                        <option value="EVENT">이벤트</option>
                        <option value="EARLY_BIRD">조기예약</option>
                        <option value="LAST_MINUTE">직전예약</option>
                        <option value="MEMBER">회원 전용</option>
                        <option value="GROUP">단체</option>
                        <option value="LONG_STAY">장기투숙</option>
                        <option value="GOVERNMENT">관공서</option>
                    </select>
                </div>
            </div>

            <!-- 사용여부 -->
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label required">사용여부</label>
                <div class="col-sm-3">
                    <div class="btn-group mt-1" role="group">
                        <input type="radio" class="btn-check" name="useYn" id="useYnY" value="true" checked>
                        <label class="btn btn-outline-primary btn-sm" for="useYnY">Y</label>
                        <input type="radio" class="btn-check" name="useYn" id="useYnN" value="false">
                        <label class="btn btn-outline-primary btn-sm" for="useYnN">N</label>
                    </div>
                </div>
            </div>

            <!-- 최종 수정일 (수정모드만) -->
            <div class="row mb-3" id="updatedAtRow" style="display:none;">
                <label class="col-sm-2 col-form-label">최종 수정일</label>
                <div class="col-sm-6">
                    <span id="updatedAt" class="form-control-plaintext">-</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Down/Up sale 요금 설정 -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <h6 class="fw-bold mb-3"><i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> Down/Up sale 요금 설정</h6>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label required">금액 설정</label>
                <div class="col-sm-8">
                    <div class="d-flex align-items-center">
                        <select class="form-select me-2" id="downUpSign" style="width:120px;">
                            <option value="">미사용</option>
                            <option value="-">▼ Down</option>
                            <option value="+">▲ Up</option>
                        </select>
                        <input type="number" class="form-control me-2" id="downUpValue" placeholder="숫자만 입력" style="width:150px;" step="0.01">
                        <div class="btn-group" role="group">
                            <input type="radio" class="btn-check" name="downUpUnit" id="unitAmount" value="AMOUNT" checked>
                            <label class="btn btn-outline-secondary btn-sm" for="unitAmount">정액</label>
                            <input type="radio" class="btn-check" name="downUpUnit" id="unitPercent" value="PERCENT">
                            <label class="btn btn-outline-secondary btn-sm" for="unitPercent">정률(%)</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">소수점 처리</label>
                <div class="col-sm-8">
                    <div class="d-flex align-items-center">
                        <span class="me-2">소수점</span>
                        <input type="number" class="form-control me-2" id="roundingDecimalPoint" value="0" min="0" style="width:100px;">
                        <span class="me-2">자리 수</span>
                        <select class="form-select" id="roundingMethod" style="width:130px;">
                            <option value="">선택</option>
                            <option value="CEIL">올림</option>
                            <option value="FLOOR">내림</option>
                            <option value="HALF_UP">반 올림</option>
                            <option value="HALF_DOWN">반 내림</option>
                            <option value="TRUNCATE">절사</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 하단 버튼 -->
    <div class="d-flex justify-content-between mt-4">
        <div>
            <button type="button" id="btnDelete" class="btn btn-outline-danger" style="display:none;"
                    onclick="PromotionCodeForm.remove()">
                <i class="fas fa-trash me-1"></i>삭제
            </button>
        </div>
        <div>
            <a href="/admin/promotion-codes" class="btn btn-secondary me-2">
                <i class="fas fa-arrow-left me-1"></i>취소
            </a>
            <button type="button" class="btn btn-primary" id="btnSave" onclick="PromotionCodeForm.save()">
                <i class="fas fa-save me-1"></i>등록
            </button>
        </div>
    </div>

    <input type="hidden" id="promotionCodeId" th:value="${promotionCodeId}">

    <!-- 레이트 코드 조회 모달 -->
    <div class="modal fade" id="rateCodeModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">레이트 코드 조회</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 mb-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label">판매 기간</label>
                            <div class="d-flex align-items-center">
                                <input type="date" class="form-control form-control-sm" id="modalSearchStartDate">
                                <span class="mx-2">~</span>
                                <input type="date" class="form-control form-control-sm" id="modalSearchEndDate">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">레이트 코드</label>
                            <input type="text" class="form-control form-control-sm" id="modalSearchRateCode" placeholder="코드를 입력해주세요.">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">사용여부</label>
                            <div class="btn-group d-block" role="group">
                                <input type="radio" class="btn-check" name="modalUseYn" id="modalUseYnAll" value="" checked>
                                <label class="btn btn-outline-secondary btn-sm" for="modalUseYnAll">전체</label>
                                <input type="radio" class="btn-check" name="modalUseYn" id="modalUseYnY" value="true">
                                <label class="btn btn-outline-secondary btn-sm" for="modalUseYnY">Y</label>
                                <input type="radio" class="btn-check" name="modalUseYn" id="modalUseYnN" value="false">
                                <label class="btn btn-outline-secondary btn-sm" for="modalUseYnN">N</label>
                            </div>
                        </div>
                        <div class="col-md-2 d-flex">
                            <button class="btn btn-outline-primary btn-sm me-1" onclick="PromotionCodeForm.searchRateCodes()">
                                <i class="fas fa-search"></i>
                            </button>
                            <button class="btn btn-outline-secondary btn-sm" onclick="PromotionCodeForm.resetRateCodeSearch()">
                                <i class="fas fa-redo"></i>
                            </button>
                        </div>
                    </div>
                    <table class="table table-hover table-sm" id="modalRateCodeTable">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" style="width:60px">NO</th>
                                <th style="min-width:200px">레이트 코드</th>
                                <th class="text-center" style="min-width:220px">판매기간</th>
                                <th class="text-center" style="min-width:120px">카테고리</th>
                                <th class="text-center" style="width:100px">통화구분</th>
                                <th class="text-center" style="width:80px">사용여부</th>
                                <th class="text-center" style="width:60px">선택</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary" onclick="PromotionCodeForm.applyRateCode()">적용</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/promotion-code-form.js}"></script>
</th:block>
</body>
</html>
