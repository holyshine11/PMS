<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>취소 정책 관리</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fas fa-ban me-2"></i>취소 정책 관리
        </h4>
    </div>

    <!-- 프로퍼티 미선택 안내 -->
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <div id="policyContainer" style="display:none;">

        <!-- 프리셋 버튼 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="fw-bold mb-0">
                        <i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> 프리셋 적용
                    </h6>
                    <div>
                        <button type="button" class="btn btn-outline-primary btn-sm me-1" id="btnPresetStandard">
                            <i class="fas fa-check-circle me-1"></i>표준
                        </button>
                        <button type="button" class="btn btn-outline-danger btn-sm me-1" id="btnPresetStrict">
                            <i class="fas fa-lock me-1"></i>엄격
                        </button>
                        <button type="button" class="btn btn-outline-success btn-sm" id="btnPresetFlexible">
                            <i class="fas fa-unlock me-1"></i>유연
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 취소 수수료 정책 테이블 -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="fw-bold mb-0">
                        <i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> 취소 수수료 정책
                    </h6>
                    <button type="button" class="btn btn-outline-primary btn-sm" id="btnAddRow">
                        <i class="fas fa-plus me-1"></i>행 추가
                    </button>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered align-middle mb-0" id="cancelFeeTable">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" style="width:120px;">체크인 기준</th>
                                <th class="text-center" style="width:80px;">N일</th>
                                <th class="text-center" style="width:100px;"></th>
                                <th class="text-center" style="width:120px;">수수료</th>
                                <th class="text-center" style="width:140px;">수수료 유형</th>
                                <th class="text-center" style="width:80px;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="cancelFeeBody">
                            <!-- 동적 행 (JS에서 렌더링) -->
                        </tbody>
                    </table>
                </div>
                <div id="cancelFeeEmpty" class="text-center text-muted py-4" style="display:none;">
                    <i class="fas fa-info-circle me-1"></i>등록된 취소 정책이 없습니다. 행 추가 버튼을 클릭하세요.
                </div>
            </div>
        </div>

        <!-- 정책 요약 -->
        <div id="policySummary" class="card border-0 shadow-sm mb-4" style="display:none;">
            <div class="card-header bg-white">
                <h6 class="fw-bold mb-0">
                    <i class="fas fa-square me-1 text-primary" style="font-size:8px;"></i> 정책 요약
                </h6>
            </div>
            <div class="card-body">
                <ul id="policySummaryList" class="mb-0 ps-3"></ul>
            </div>
        </div>

        <!-- 저장 버튼 -->
        <div class="d-flex justify-content-end mb-4">
            <button type="button" class="btn btn-primary" id="btnSavePolicies">
                <i class="fas fa-save me-1"></i>저장
            </button>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/cancellation-policy-page.js}"></script>
</th:block>
</body>
</html>
