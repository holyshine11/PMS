<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>얼리/레이트 정책 관리</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fas fa-clock me-2"></i>얼리 체크인 / 레이트 체크아웃 정책
        </h4>
    </div>

    <!-- 프로퍼티 미선택 안내 -->
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <div id="policyContainer" style="display:none;">

        <!-- ========== 얼리 체크인 정책 ========== -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="fw-bold mb-0">
                        <i class="fas fa-sign-in-alt me-2 text-primary"></i>얼리 체크인 정책
                    </h6>
                    <button type="button" class="btn btn-outline-primary btn-sm" id="btnAddEarlyRow">
                        <i class="fas fa-plus me-1"></i>행 추가
                    </button>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered align-middle mb-0" id="earlyCheckinTable">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" style="width:60px;">No</th>
                                <th class="text-center" style="width:150px;">시작시간</th>
                                <th class="text-center" style="width:150px;">종료시간</th>
                                <th class="text-center" style="width:150px;">요금유형</th>
                                <th class="text-center" style="width:150px;">요금값</th>
                                <th>설명</th>
                                <th class="text-center" style="width:80px;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="earlyCheckinBody">
                            <!-- 동적 행 (JS에서 렌더링) -->
                        </tbody>
                    </table>
                </div>
                <div id="earlyCheckinEmpty" class="text-center text-muted py-4" style="display:none;">
                    <i class="fas fa-info-circle me-1"></i>등록된 얼리 체크인 정책이 없습니다. 행 추가 버튼을 클릭하세요.
                </div>
            </div>
        </div>

        <!-- ========== 레이트 체크아웃 정책 ========== -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="fw-bold mb-0">
                        <i class="fas fa-sign-out-alt me-2" style="color:#EF476F;"></i>레이트 체크아웃 정책
                    </h6>
                    <button type="button" class="btn btn-outline-danger btn-sm" id="btnAddLateRow">
                        <i class="fas fa-plus me-1"></i>행 추가
                    </button>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered align-middle mb-0" id="lateCheckoutTable">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" style="width:60px;">No</th>
                                <th class="text-center" style="width:150px;">시작시간</th>
                                <th class="text-center" style="width:150px;">종료시간</th>
                                <th class="text-center" style="width:150px;">요금유형</th>
                                <th class="text-center" style="width:150px;">요금값</th>
                                <th>설명</th>
                                <th class="text-center" style="width:80px;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="lateCheckoutBody">
                            <!-- 동적 행 (JS에서 렌더링) -->
                        </tbody>
                    </table>
                </div>
                <div id="lateCheckoutEmpty" class="text-center text-muted py-4" style="display:none;">
                    <i class="fas fa-info-circle me-1"></i>등록된 레이트 체크아웃 정책이 없습니다. 행 추가 버튼을 클릭하세요.
                </div>
            </div>
        </div>

        <!-- 저장 버튼 -->
        <div class="d-flex justify-content-end mb-4">
            <button type="button" class="btn btn-primary" id="btnSavePolicies">
                <i class="fas fa-save me-1"></i>저장
            </button>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/early-late-policy-page.js}"></script>
</th:block>
</body>
</html>
