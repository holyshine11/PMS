<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>객실현황 (Room Rack)</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-th me-2"></i>객실현황 (Room Rack)</h4>
        <div>
            <span class="text-muted me-2" id="lastRefresh"></span>
            <button class="btn btn-sm btn-outline-primary" id="refreshBtn">
                <i class="fas fa-sync-alt me-1"></i>새로고침
            </button>
        </div>
    </div>

    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <!-- 상태별 범례 + 카운트 -->
    <div class="d-flex flex-wrap gap-2 mb-3" id="legendBar">
        <span class="badge room-card-vc px-2 py-1">VC <span id="cntVC">0</span></span>
        <span class="badge room-card-vd px-2 py-1">VD <span id="cntVD">0</span></span>
        <span class="badge room-card-oc px-2 py-1">OC <span id="cntOC">0</span></span>
        <span class="badge room-card-od px-2 py-1">OD <span id="cntOD">0</span></span>
        <span class="badge room-card-ooo px-2 py-1">OOO <span id="cntOOO">0</span></span>
        <span class="badge room-card-oos px-2 py-1">OOS <span id="cntOOS">0</span></span>
    </div>

    <!-- Room Rack 그리드 -->
    <div id="roomRackContainer"></div>

    <!-- 객실 상세 모달 -->
    <div class="modal fade" id="roomDetailModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-door-open me-2"></i>객실 상세</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row mb-2"><div class="col-4 text-muted">호수</div><div class="col-8" id="rdRoom">-</div></div>
                    <div class="row mb-2"><div class="col-4 text-muted">상태</div><div class="col-8" id="rdStatus">-</div></div>
                    <div class="row mb-2" id="rdGuestRow"><div class="col-4 text-muted">투숙객</div><div class="col-8" id="rdGuest">-</div></div>
                    <div class="row mb-2" id="rdCheckOutRow"><div class="col-4 text-muted">체크아웃</div><div class="col-8" id="rdCheckOut">-</div></div>
                    <div class="row mb-2"><div class="col-4 text-muted">HK 메모</div><div class="col-8" id="rdMemo">-</div></div>
                    <hr>
                    <div class="mb-2">
                        <label class="form-label text-muted">HK 상태 변경</label>
                        <select class="form-select" id="rdHkSelect">
                            <option value="CLEAN">CLEAN (청소완료)</option>
                            <option value="DIRTY">DIRTY (청소필요)</option>
                            <option value="OOO">OOO (사용불가)</option>
                            <option value="OOS">OOS (일시중단)</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label text-muted">메모</label>
                        <input type="text" class="form-control" id="rdHkMemo" placeholder="메모 입력...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary" id="rdSaveBtn">
                        <i class="fas fa-save me-1"></i>상태 변경
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/fd-room-rack-page.js}"></script>
</th:block>
</body>
</html>
