<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>오늘 운영현황 - Hola PMS</title>
</head>
<body>
<div layout:fragment="content">

    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-concierge-bell me-2"></i>오늘 운영현황</h4>
        <button class="btn btn-outline-secondary btn-sm" id="btnRefresh">
            <i class="fas fa-sync-alt me-1"></i>새로고침
        </button>
    </div>

    <!-- 요약 카드: 오늘 기준 운영 현황 -->
    <div class="row mb-3" id="summaryCards">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm" style="cursor:pointer;" data-filter="arrivals">
                <div class="card-body text-center py-3">
                    <div class="text-secondary mb-1"><i class="fas fa-key me-1"></i>오늘 도착</div>
                    <div class="small text-muted">체크인일=오늘 &amp; 예약상태</div>
                    <div id="summaryArrivals" style="font-size: 2.5rem; font-weight: 700; color: #0582CA; line-height: 1.2;">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm" style="cursor:pointer;" data-filter="inhouse">
                <div class="card-body text-center py-3">
                    <div class="text-secondary mb-1"><i class="fas fa-bed me-1"></i>투숙중</div>
                    <div class="small text-muted">체크인/투숙중 상태</div>
                    <div id="summaryInHouse" style="font-size: 2.5rem; font-weight: 700; color: #003554; line-height: 1.2;">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm" style="cursor:pointer;" data-filter="departures">
                <div class="card-body text-center py-3">
                    <div class="text-secondary mb-1"><i class="fas fa-door-closed me-1"></i>오늘 출발</div>
                    <div class="small text-muted">체크아웃일=오늘 &amp; 투숙중</div>
                    <div id="summaryDepartures" style="font-size: 2.5rem; font-weight: 700; color: #EF476F; line-height: 1.2;">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center py-3">
                    <div class="text-secondary mb-1"><i class="fas fa-hotel me-1"></i>전체</div>
                    <div class="small text-muted">오늘 관련 전체 건수</div>
                    <div id="summaryTotal" style="font-size: 2.5rem; font-weight: 700; color: #051923; line-height: 1.2;">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 필터+검색 1줄 통합 -->
    <div class="card border-0 shadow-sm mb-3" id="filterCard">
        <div class="card-body py-3">
            <div class="d-flex flex-wrap align-items-center gap-2">
                <!-- 상태 필터 -->
                <div class="d-flex flex-wrap gap-2" id="statusFilterGroup">
                    <button class="btn btn-sm status-filter-btn active" data-status="" style="background:#051923; color:#fff; border:2px solid #051923;">전체</button>
                    <button class="btn btn-sm status-filter-btn" data-status="RESERVED" style="background:#d4edff; color:#0582CA; border:2px solid transparent;">예약</button>
                    <button class="btn btn-sm status-filter-btn" data-status="CHECK_IN" style="background:#d1ecf1; color:#0c5460; border:2px solid transparent;">체크인</button>
                    <button class="btn btn-sm status-filter-btn" data-status="INHOUSE" style="background:#003554; color:#ffffff; border:2px solid transparent;">투숙중</button>
                    <button class="btn btn-sm status-filter-btn" data-status="CHECKED_OUT" style="background:#e2e3e5; color:#383d41; border:2px solid transparent;">체크아웃</button>
                    <button class="btn btn-sm status-filter-btn" data-status="CANCELED" style="background:#f8d7da; color:#721c24; border:2px solid transparent;">취소</button>
                    <button class="btn btn-sm status-filter-btn" data-status="NO_SHOW" style="background:#fff3cd; color:#856404; border:2px solid transparent;">노쇼</button>
                </div>
                <!-- 검색 (오른쪽 정렬) -->
                <div class="d-flex gap-2 ms-auto align-items-center">
                    <input type="text" class="form-control form-control-sm" id="keyword" placeholder="예약번호/예약자/전화번호" style="width:200px;">
                    <button class="btn btn-primary btn-sm" id="searchBtn"><i class="fas fa-search me-1"></i>검색</button>
                    <button class="btn btn-outline-secondary btn-sm" id="resetBtn"><i class="fas fa-undo me-1"></i>초기화</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 데이터 테이블 -->
    <div class="card border-0 shadow-sm" id="tableCard">
        <div class="card-body">
            <table id="operationTable" class="table table-hover mb-0" style="width:100%">
                <thead class="table-light">
                <tr>
                    <th>예약번호</th>
                    <th>예약자</th>
                    <th>객실타입</th>
                    <th>객실</th>
                    <th>인원</th>
                    <th>체크인</th>
                    <th>체크아웃</th>
                    <th>박수</th>
                    <th>상태</th>
                    <th>결제</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- 예약 상세 Drawer (Offcanvas) -->
    <div class="offcanvas offcanvas-end" id="reservationDrawer" tabindex="-1">
        <div class="offcanvas-header border-bottom">
            <h6 class="offcanvas-title fw-bold">
                예약 상세 <span id="drawerConfirmNo" class="ms-2" style="color:#0582CA;"></span>
            </h6>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0" id="drawerBody">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
        <div class="offcanvas-footer border-top p-3 d-flex justify-content-between" id="drawerFooter">
            <a id="drawerFullDetailLink" href="#" target="_blank" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-edit me-1"></i>예약정보 수정
            </a>
            <div id="drawerActionButtons" class="d-flex gap-1">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="offcanvas">닫기</button>
                <button type="button" class="btn btn-outline-secondary btn-sm d-none" id="drawerBtnCancel">
                    <i class="fas fa-times me-1"></i>취소
                </button>
                <button type="button" class="btn btn-outline-warning btn-sm d-none" id="drawerBtnNoshow">
                    <i class="fas fa-user-times me-1"></i>노쇼
                </button>
                <button type="button" class="btn btn-primary btn-sm d-none" id="drawerBtnCheckin">
                    <i class="fas fa-key me-1"></i>체크인
                </button>
                <button type="button" class="btn btn-sm d-none" id="drawerBtnInhouse" style="background-color:#003554; color:#fff;">
                    <i class="fas fa-bed me-1"></i>투숙중 처리
                </button>
                <button type="button" class="btn btn-sm d-none" id="drawerBtnCheckout" style="background-color:#EF476F; color:#fff;">
                    <i class="fas fa-door-closed me-1"></i>체크아웃
                </button>
            </div>
        </div>
    </div>

    <!-- 취소/노쇼 수수료 미리보기 모달 -->
    <div class="modal fade" id="fdCancelPreviewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="fdCancelPreviewTitle">예약 취소 확인</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row mb-2">
                        <label class="col-sm-5 col-form-label">예약번호</label>
                        <div class="col-sm-7 d-flex align-items-center"><span id="fdCpReservationNo">-</span></div>
                    </div>
                    <div class="row mb-2">
                        <label class="col-sm-5 col-form-label">투숙객</label>
                        <div class="col-sm-7 d-flex align-items-center"><span id="fdCpGuestName">-</span></div>
                    </div>
                    <div class="row mb-2">
                        <label class="col-sm-5 col-form-label">체크인 / 체크아웃</label>
                        <div class="col-sm-7 d-flex align-items-center"><span id="fdCpCheckInOut">-</span></div>
                    </div>
                    <hr>
                    <div class="row mb-2">
                        <label class="col-sm-5 col-form-label">1박 객실요금</label>
                        <div class="col-sm-7 d-flex align-items-center"><span id="fdCpFirstNight">-</span></div>
                    </div>
                    <div class="row mb-2">
                        <label class="col-sm-5 col-form-label">적용 정책</label>
                        <div class="col-sm-7 d-flex align-items-center"><span id="fdCpPolicyDesc" class="text-muted small">-</span></div>
                    </div>
                    <div class="row mb-2">
                        <label class="col-sm-5 col-form-label" style="color:#EF476F;">취소 수수료</label>
                        <div class="col-sm-7 d-flex align-items-center"><span id="fdCpCancelFeeAmt" style="color:#EF476F;">-</span></div>
                    </div>
                    <div class="row mb-2">
                        <label class="col-sm-5 col-form-label">총 결제액</label>
                        <div class="col-sm-7 d-flex align-items-center"><span id="fdCpTotalPaid">-</span></div>
                    </div>
                    <div class="row mb-2">
                        <label class="col-sm-5 col-form-label" style="color:#0582CA;">환불 예정액</label>
                        <div class="col-sm-7 d-flex align-items-center"><span id="fdCpRefundAmt" style="color:#0582CA;">-</span></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-danger" id="fdCancelConfirmBtn">
                        <i class="fas fa-ban me-1"></i>취소 확인
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/fd-operations-page.js}"></script>
</th:block>
</body>
</html>
