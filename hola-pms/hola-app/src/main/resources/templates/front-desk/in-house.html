<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>투숙 (In-House)</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-user-check me-2"></i>투숙 (In-House)</h4>
    </div>

    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center pt-3 pb-2">
            <h6 class="fw-bold mb-0">현재 투숙중 (<span id="inHouseCount">0</span>)</h6>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="inHouseTable">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">예약번호</th>
                            <th>투숙객</th>
                            <th>객실타입</th>
                            <th>객실</th>
                            <th>체크인</th>
                            <th>실제체크인</th>
                            <th>체크아웃</th>
                            <th class="text-end">요금</th>
                            <th class="text-end">결제</th>
                            <th class="text-end pe-3">잔액</th>
                        </tr>
                    </thead>
                    <tbody id="inHouseBody">
                        <tr><td colspan="10" class="text-center py-4 text-muted">데이터 로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/fd-in-house-page.js}"></script>
</th:block>
</body>
</html>
