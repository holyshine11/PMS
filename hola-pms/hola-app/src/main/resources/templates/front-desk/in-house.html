<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>투숙 (In-House)</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-user-check me-2"></i>투숙 (In-House)</h4>
        <span class="text-muted" id="todayLabel"></span>
    </div>

    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <!-- 요약 카드 -->
    <div class="row g-3 mb-4" id="summaryCards">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm dashboard-card" style="border-left: 4px solid #0582CA !important;">
                <div class="card-body py-3">
                    <p class="text-muted mb-1">투숙중</p>
                    <h3 class="mb-0" id="inHouseTotal">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm dashboard-card" style="border-left: 4px solid #003554 !important;">
                <div class="card-body py-3">
                    <p class="text-muted mb-1">오늘 체크아웃</p>
                    <h3 class="mb-0" id="todayCheckoutCount">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm dashboard-card" style="border-left: 4px solid #EF476F !important;">
                <div class="card-body py-3">
                    <p class="text-muted mb-1">미결제 잔액</p>
                    <h3 class="mb-0" id="balanceWarningCount">-</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 pt-3 pb-2">
            <div class="row align-items-center">
                <div class="col">
                    <h6 class="fw-bold mb-0">현재 투숙중 (<span id="inHouseCount">0</span>)</h6>
                </div>
                <div class="col-auto">
                    <input type="text" class="form-control form-control-sm" id="inHouseSearch"
                           placeholder="이름, 객실번호, 예약번호 검색..." style="width: 250px;">
                </div>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="inHouseTable">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">예약번호</th>
                            <th>투숙객</th>
                            <th>객실타입</th>
                            <th>객실</th>
                            <th>체크인</th>
                            <th>실제체크인</th>
                            <th>체크아웃</th>
                            <th class="text-end">요금</th>
                            <th class="text-end">결제</th>
                            <th class="text-end pe-3">잔액</th>
                        </tr>
                    </thead>
                    <tbody id="inHouseBody">
                        <tr><td colspan="10" class="text-center py-4 text-muted">데이터 로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/fd-in-house-page.js}"></script>
</th:block>
</body>
</html>
