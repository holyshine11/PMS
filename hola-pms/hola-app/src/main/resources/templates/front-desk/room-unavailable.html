<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>OOO/OOS 관리 - Hola PMS</title>
</head>
<body>
<div layout:fragment="content">

    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0"><i class="fas fa-ban me-2"></i>OOO/OOS 관리</h4>
        <div>
            <select id="filterType" class="form-select form-select-sm d-inline-block" style="width: auto;">
                <option value="">전체</option>
                <option value="OOO">OOO (사용불가)</option>
                <option value="OOS">OOS (일시중단)</option>
            </select>
            <button class="btn btn-primary btn-sm ms-2" id="btnNew">
                <i class="fas fa-plus me-1"></i>등록
            </button>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <table id="tableUnavailable" class="table table-hover w-100">
                <thead class="table-light">
                <tr>
                    <th>타입</th>
                    <th>객실</th>
                    <th>사유코드</th>
                    <th>상세 사유</th>
                    <th>시작일</th>
                    <th>종료일</th>
                    <th>복귀상태</th>
                    <th>등록일</th>
                    <th>액션</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- 등록/수정 모달 -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title fw-bold" id="formModalTitle">OOO/OOS 등록</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="formId">
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label required">타입</label>
                        <div class="col-sm-9">
                            <select id="formType" class="form-select">
                                <option value="OOO">OOO (사용불가 - 재고 차감)</option>
                                <option value="OOS">OOS (일시중단 - 재고 미차감)</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label required">객실</label>
                        <div class="col-sm-9">
                            <select id="formRoom" class="form-select"></select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">사유코드</label>
                        <div class="col-sm-9">
                            <select id="formReasonCode" class="form-select">
                                <option value="">선택</option>
                                <optgroup label="OOO 사유">
                                    <option value="MAINTENANCE">보수 (Maintenance)</option>
                                    <option value="RENOVATION">리모델링 (Renovation)</option>
                                    <option value="DAMAGE">손상 (Damage)</option>
                                    <option value="PLUMBING">배관 (Plumbing)</option>
                                    <option value="ELECTRICAL">전기 (Electrical)</option>
                                </optgroup>
                                <optgroup label="OOS 사유">
                                    <option value="SHOWROOM">전시 (Showroom)</option>
                                    <option value="VIP_HOLD">VIP 대기 (VIP Hold)</option>
                                    <option value="STAFF_USE">직원사용 (Staff Use)</option>
                                    <option value="DEEP_CLEAN">특별청소 (Deep Clean)</option>
                                    <option value="INSPECTION">점검 (Inspection)</option>
                                </optgroup>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">상세 사유</label>
                        <div class="col-sm-9">
                            <textarea id="formReasonDetail" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label required">시작일</label>
                        <div class="col-sm-9">
                            <input type="date" id="formFromDate" class="form-control">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label required">종료일</label>
                        <div class="col-sm-9">
                            <input type="date" id="formThroughDate" class="form-control">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">복귀상태</label>
                        <div class="col-sm-9">
                            <select id="formReturnStatus" class="form-select">
                                <option value="DIRTY">Dirty (청소 필요)</option>
                                <option value="CLEAN">Clean (바로 사용 가능)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-arrow-left me-1"></i>취소
                    </button>
                    <button type="button" class="btn btn-primary" id="btnSave">
                        <i class="fas fa-save me-1"></i>저장
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/fd-room-unavailable-page.js}"></script>
</th:block>
</body>
</html>
