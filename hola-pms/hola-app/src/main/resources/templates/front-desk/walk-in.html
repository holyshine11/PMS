<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>현장투숙 (Walk-In)</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-walking me-2"></i>현장투숙 (Walk-In)</h4>
    </div>

    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <div class="card border-0 shadow-sm" id="walkInForm">
        <div class="card-header bg-white border-0 pt-3 pb-2">
            <h6 class="fw-bold mb-0">현장 투숙 등록</h6>
        </div>
        <div class="card-body">
            <p class="text-muted mb-3">현장 방문 고객의 예약을 생성하고 즉시 체크인합니다.</p>
            <div class="alert alert-info">
                <i class="fas fa-info-circle me-1"></i>
                Walk-In은 <a th:href="@{/admin/reservations}" class="alert-link">예약 등록</a>에서 예약 생성 후
                <a th:href="@{/admin/front-desk/arrivals}" class="alert-link">도착 화면</a>에서 체크인 처리합니다.
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/admin/reservations}" class="btn btn-primary">
                    <i class="fas fa-plus me-1"></i>새 예약 등록
                </a>
                <a th:href="@{/admin/front-desk/arrivals}" class="btn btn-outline-primary">
                    <i class="fas fa-plane-arrival me-1"></i>도착 화면으로 이동
                </a>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/fd-walk-in-page.js}"></script>
</th:block>
</body>
</html>
