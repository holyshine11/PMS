<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>현장투숙 (Walk-In)</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-walking me-2"></i>현장투숙 (Walk-In)</h4>
    </div>

    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <div class="card border-0 shadow-sm" id="walkInForm">
        <div class="card-header bg-white border-0 pt-3 pb-2">
            <h6 class="fw-bold mb-0">현장 투숙 등록</h6>
        </div>
        <div class="card-body">
            <p class="text-muted mb-3">현장 방문 고객의 예약을 생성하면 즉시 도착 화면에서 체크인할 수 있습니다.</p>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <div class="card border h-100">
                        <div class="card-body text-center py-4">
                            <i class="fas fa-plus-circle fa-2x text-primary mb-2"></i>
                            <h6>Walk-In 예약 등록</h6>
                            <p class="text-muted small mb-3">예약 생성 후 도착 화면으로 바로 이동합니다.</p>
                            <a th:href="@{/admin/reservations/new?walkin=true}" class="btn btn-primary">
                                <i class="fas fa-walking me-1"></i>Walk-In 예약 등록
                            </a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border h-100">
                        <div class="card-body text-center py-4">
                            <i class="fas fa-plane-arrival fa-2x text-muted mb-2"></i>
                            <h6>도착 화면</h6>
                            <p class="text-muted small mb-3">이미 등록된 예약의 체크인을 처리합니다.</p>
                            <a th:href="@{/admin/front-desk/arrivals}" class="btn btn-outline-primary">
                                <i class="fas fa-plane-arrival me-1"></i>도착 화면으로 이동
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/fd-walk-in-page.js}"></script>
</th:block>
</body>
</html>
