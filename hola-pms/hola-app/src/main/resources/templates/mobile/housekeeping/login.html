<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하우스키핑 로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #051923; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; border-radius: 16px; padding: 40px 24px;
            width: 100%; max-width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .login-title { text-align: center; margin-bottom: 32px; }
        .login-title .brand { font-size: 28px; font-weight: 700; color: #0582CA; }
        .login-title .sub { font-size: 15px; color: #6c757d; margin-top: 4px; }
        .btn-login { height: 48px; font-size: 16px; font-weight: 600; border-radius: 10px;
            background: #0582CA; border: none; }
        .btn-login:hover { background: #046a9e; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">
            <div class="brand"><i class="fas fa-hotel me-2"></i>Hola PMS</div>
            <div class="sub">하우스키핑 로그인</div>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
            <i class="fas fa-exclamation-circle me-1"></i>아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2" role="alert">
            <i class="fas fa-check-circle me-1"></i>로그아웃되었습니다.
        </div>

        <form th:action="@{/m/housekeeping/login}" method="post">
            <div class="mb-3">
                <input type="text" class="form-control form-control-lg" name="username"
                       placeholder="아이디" required autofocus>
            </div>
            <div class="mb-4">
                <input type="password" class="form-control form-control-lg" name="password"
                       placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100">로그인</button>
        </form>
    </div>
</body>
</html>
