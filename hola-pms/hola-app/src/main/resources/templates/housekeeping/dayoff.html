<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>휴무일 관리</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-calendar-minus me-2"></i>휴무일 관리</h4>
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-secondary btn-sm" id="btnPrevMonth"><i class="fas fa-chevron-left"></i></button>
            <span id="monthLabel" class="mx-2" style="font-size:16px;min-width:120px;text-align:center;"></span>
            <button class="btn btn-outline-secondary btn-sm" id="btnNextMonth"><i class="fas fa-chevron-right"></i></button>
            <button class="btn btn-outline-primary btn-sm ms-2" id="btnToday">오늘</button>
        </div>
    </div>

    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <!-- 범례 -->
    <div class="card border-0 shadow-sm mb-3" id="legendRow">
        <div class="card-body py-2">
            <div class="d-flex flex-wrap gap-3" style="font-size:13px;">
                <span><span class="badge bg-success">승인</span> 관리자 승인 완료</span>
                <span><span class="badge bg-warning text-dark">대기</span> 모바일 요청, 승인 대기</span>
                <span><span class="badge bg-danger">거절</span> 관리자 거절</span>
                <span class="text-muted">날짜 셀 클릭: 휴무일 등록 / 기존 셀 클릭: 삭제·승인·거절</span>
            </div>
        </div>
    </div>

    <!-- 캘린더 -->
    <div class="card border-0 shadow-sm" id="calendarCard">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-bordered table-sm mb-0" id="dayOffCalendar" style="font-size:12px;">
                    <thead class="table-light" id="dayOffHead"></thead>
                    <tbody id="dayOffBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 등록 모달 -->
    <div class="modal fade" id="dayOffModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title fw-bold" id="dayOffModalTitle">휴무일 등록</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="modalHkId">
                    <input type="hidden" id="modalDate">
                    <div class="mb-2">
                        <strong id="modalHkName"></strong> · <span id="modalDateLabel"></span>
                    </div>
                    <div class="mb-3" id="modalNoteGroup">
                        <label class="form-label">사유 (선택)</label>
                        <input type="text" class="form-control form-control-sm" id="modalNote" maxlength="200">
                    </div>
                    <!-- 기존 휴무일 상세 (승인/거절용) -->
                    <div class="d-none" id="modalExistingInfo">
                        <div class="mb-2">상태: <span id="modalStatus"></span></div>
                        <div class="mb-2" id="modalExistingNote"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <!-- 새 등록 -->
                    <div id="modalCreateBtns">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">취소</button>
                        <button type="button" class="btn btn-primary btn-sm" id="btnSaveDayOff">등록</button>
                    </div>
                    <!-- 기존 관리 -->
                    <div class="d-none" id="modalManageBtns">
                        <button type="button" class="btn btn-outline-danger btn-sm" id="btnDeleteDayOff">
                            <i class="fas fa-trash me-1"></i>삭제
                        </button>
                        <button type="button" class="btn btn-success btn-sm d-none" id="btnApproveDayOff">
                            <i class="fas fa-check me-1"></i>승인
                        </button>
                        <button type="button" class="btn btn-danger btn-sm d-none" id="btnRejectDayOff">
                            <i class="fas fa-times me-1"></i>거절
                        </button>
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script src="/js/hk-dayoff-page.js"></script>
</th:block>
</body>
</html>
