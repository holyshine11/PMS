<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>하우스키핑 작업 보드</title>
    <link rel="stylesheet" th:href="@{/css/hk-board.css}">
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0"><i class="fas fa-columns me-2"></i>작업 보드</h4>
        <div class="d-flex gap-2">
            <input type="date" class="form-control form-control-sm" id="boardDate" style="width: 150px;">
            <select class="form-select form-select-sm" id="boardFilterAssigned" style="width: 140px;">
                <option value="">전체 담당자</option>
            </select>
            <button class="btn btn-sm btn-outline-primary" id="btnBoardRefresh">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>

    <!-- 프로퍼티 미선택 -->
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <!-- 칸반 보드 -->
    <div class="kanban-container" id="kanbanBoard">
        <div class="kanban-column col-pending">
            <div class="kanban-column-header">대기 (<span id="countPending">0</span>)</div>
            <div id="colPending"></div>
        </div>
        <div class="kanban-column col-progress">
            <div class="kanban-column-header">진행중 (<span id="countProgress">0</span>)</div>
            <div id="colProgress"></div>
        </div>
        <div class="kanban-column col-completed">
            <div class="kanban-column-header">완료 (<span id="countCompleted">0</span>)</div>
            <div id="colCompleted"></div>
        </div>
        <div class="kanban-column col-inspected">
            <div class="kanban-column-header">검수완료 (<span id="countInspected">0</span>)</div>
            <div id="colInspected"></div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script src="/js/hk-board-page.js"></script>
</th:block>
</body>
</html>
