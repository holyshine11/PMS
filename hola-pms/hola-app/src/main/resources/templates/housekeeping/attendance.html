<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>근태관리</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-calendar-check me-2"></i>근태관리</h4>
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-secondary btn-sm" id="btnPrevMonth"><i class="fas fa-chevron-left"></i></button>
            <span id="monthLabel" class="mx-2" style="font-size:16px;min-width:120px;text-align:center;"></span>
            <button class="btn btn-outline-secondary btn-sm" id="btnNextMonth"><i class="fas fa-chevron-right"></i></button>
            <button class="btn btn-outline-primary btn-sm ms-2" id="btnToday">오늘</button>
        </div>
    </div>

    <!-- 프로퍼티 미선택 -->
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <!-- 범례 -->
    <div class="card border-0 shadow-sm mb-3" id="legendRow">
        <div class="card-body py-2">
            <div class="d-flex flex-wrap gap-3" style="font-size:13px;">
                <span><span style="display:inline-block;width:16px;height:16px;background:#d4edda;border-radius:3px;vertical-align:middle;text-align:center;line-height:16px;color:#155724;font-size:11px;">●</span> 출근 — 모바일 출근 완료</span>
                <span><span style="display:inline-block;width:16px;height:16px;background:#cce5ff;border-radius:3px;vertical-align:middle;text-align:center;line-height:16px;color:#004085;font-size:11px;">●</span> 퇴근 — 퇴근 처리 완료</span>
                <span><span style="display:inline-block;width:16px;height:16px;background:#e2e3e5;border-radius:3px;vertical-align:middle;text-align:center;line-height:16px;color:#383d41;font-size:11px;">—</span> 휴무</span>
                <span><span style="display:inline-block;width:16px;height:16px;background:#fff3cd;border-radius:3px;vertical-align:middle;text-align:center;line-height:16px;color:#856404;font-size:11px;">○</span> 출근전 — 출근부 등록, 미출근</span>
                <span><span style="display:inline-block;width:16px;height:16px;background:#fff;border:1px solid #dee2e6;border-radius:3px;vertical-align:middle;"></span> 미등록</span>
            </div>
        </div>
    </div>

    <!-- 캘린더 테이블 -->
    <div class="card border-0 shadow-sm" id="calendarCard">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-bordered table-sm mb-0" id="attendanceCalendar" style="font-size:12px;">
                    <thead class="table-light" id="calendarHead"></thead>
                    <tbody id="calendarBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 편집 모달 -->
    <div class="modal fade" id="editAttModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title fw-bold">근태 수정</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editAttId">
                    <div class="mb-3">
                        <label class="form-label">상태</label>
                        <select class="form-select form-select-sm" id="editAttStatus">
                            <option value="BEFORE_WORK">출근전</option>
                            <option value="WORKING">출근</option>
                            <option value="LEFT">퇴근</option>
                            <option value="DAY_OFF">휴무</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">출근 시각</label>
                        <input type="time" class="form-control form-control-sm" id="editClockIn">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">퇴근 시각</label>
                        <input type="time" class="form-control form-control-sm" id="editClockOut">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary btn-sm" id="btnSaveAtt">저장</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script src="/js/hk-attendance-page.js"></script>
</th:block>
</body>
</html>
