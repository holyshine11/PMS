<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>하우스키핑 설정</title>
</head>
<body>
<div layout:fragment="content">
    <h4 class="fw-bold mb-4"><i class="fas fa-cog me-2"></i>하우스키핑 설정</h4>

    <!-- 프로퍼티 미선택 알림 -->
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <!-- 탭 -->
    <ul class="nav nav-tabs mb-3" id="settingsTabs">
        <li class="nav-item">
            <a class="nav-link active" data-bs-toggle="tab" href="#tabGeneral">
                <i class="fas fa-sliders-h me-1"></i>일반 설정
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-bs-toggle="tab" href="#tabSections">
                <i class="fas fa-map-marker-alt me-1"></i>구역 관리
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-bs-toggle="tab" href="#tabCleaningPolicy">
                <i class="fas fa-broom me-1"></i>청소 정책
            </a>
        </li>
    </ul>

    <div class="tab-content" id="settingsContent">

        <!-- 일반 설정 탭 -->
        <div class="tab-pane fade show active" id="tabGeneral">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">검수 필수 여부</label>
                        <div class="col-sm-9">
                            <div class="form-check form-switch mt-1">
                                <input class="form-check-input" type="checkbox" id="cfgInspectionRequired">
                                <label class="form-check-label" for="cfgInspectionRequired">완료 후 감독자 검수 필수</label>
                            </div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">체크아웃 자동 생성</label>
                        <div class="col-sm-9">
                            <div class="form-check form-switch mt-1">
                                <input class="form-check-input" type="checkbox" id="cfgAutoCheckout">
                                <label class="form-check-label" for="cfgAutoCheckout">체크아웃 시 청소 작업 자동 생성</label>
                            </div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">체류 자동 생성</label>
                        <div class="col-sm-9">
                            <div class="form-check form-switch mt-1">
                                <input class="form-check-input" type="checkbox" id="cfgAutoStayover">
                                <label class="form-check-label" for="cfgAutoStayover">체류 객실 청소 작업 자동 생성</label>
                            </div>
                        </div>
                    </div>

                    <h6 class="fw-bold mt-4 mb-3">작업 유형별 기본 크레딧</h6>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">퇴실청소</label>
                        <div class="col-sm-3"><input type="number" class="form-control" id="cfgCheckoutCredit" step="0.1" min="0"></div>
                        <label class="col-sm-3 col-form-label">체류정리</label>
                        <div class="col-sm-3"><input type="number" class="form-control" id="cfgStayoverCredit" step="0.1" min="0"></div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">턴다운</label>
                        <div class="col-sm-3"><input type="number" class="form-control" id="cfgTurndownCredit" step="0.1" min="0"></div>
                        <label class="col-sm-3 col-form-label">딥클리닝</label>
                        <div class="col-sm-3"><input type="number" class="form-control" id="cfgDeepCleanCredit" step="0.1" min="0"></div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">간단정리</label>
                        <div class="col-sm-3"><input type="number" class="form-control" id="cfgTouchUpCredit" step="0.1" min="0"></div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">Rush 기준 (분)</label>
                        <div class="col-sm-3"><input type="number" class="form-control" id="cfgRushThreshold" min="0"></div>
                    </div>
                    <h6 class="fw-bold mt-4 mb-3">스테이오버 정책</h6>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">스테이오버 자동 생성</label>
                        <div class="col-sm-3">
                            <div class="form-check form-switch mt-1">
                                <input class="form-check-input" type="checkbox" id="cfgStayoverEnabled">
                                <label class="form-check-label" for="cfgStayoverEnabled">활성화</label>
                            </div>
                        </div>
                        <label class="col-sm-3 col-form-label">기본 횟수 (일)</label>
                        <div class="col-sm-3">
                            <input type="number" class="form-control" id="cfgStayoverFrequency" min="1" max="3" value="1">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">턴다운 자동 생성</label>
                        <div class="col-sm-3">
                            <div class="form-check form-switch mt-1">
                                <input class="form-check-input" type="checkbox" id="cfgTurndownEnabled">
                                <label class="form-check-label" for="cfgTurndownEnabled">활성화</label>
                            </div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">DND 정책</label>
                        <div class="col-sm-3">
                            <select class="form-select" id="cfgDndPolicy">
                                <option value="SKIP">스킵 (무시)</option>
                                <option value="RETRY_AFTERNOON">오후 재시도</option>
                                <option value="FORCE_AFTER_DAYS">N일 후 강제</option>
                            </select>
                        </div>
                        <label class="col-sm-3 col-form-label">DND 최대 스킵 (일)</label>
                        <div class="col-sm-3">
                            <input type="number" class="form-control" id="cfgDndMaxSkipDays" min="1" max="7" value="3">
                        </div>
                    </div>
                    <h6 class="fw-bold mt-4 mb-3">스케줄 시각</h6>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">OD 전환 시각</label>
                        <div class="col-sm-3">
                            <input type="time" class="form-control" id="cfgOdTransitionTime" value="05:00">
                        </div>
                        <label class="col-sm-3 col-form-label">작업 생성 시각</label>
                        <div class="col-sm-3">
                            <input type="time" class="form-control" id="cfgDailyTaskGenTime" value="06:00">
                        </div>
                    </div>
                    <div class="d-flex justify-content-end">
                        <button class="btn btn-primary" id="btnSaveConfig"><i class="fas fa-save me-1"></i>설정 저장</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 구역 관리 탭 -->
        <div class="tab-pane fade" id="tabSections">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold mb-0">구역 목록</h6>
                        <button class="btn btn-sm btn-primary" id="btnAddSection">
                            <i class="fas fa-plus me-1"></i>구역 추가
                        </button>
                    </div>
                    <table class="table table-hover mb-0" id="sectionTable">
                        <thead class="table-light">
                        <tr>
                            <th>구역명</th>
                            <th class="text-center">포함 층</th>
                            <th class="text-center">기본 담당자</th>
                            <th class="text-center" style="width:120px;">관리</th>
                        </tr>
                        </thead>
                        <tbody id="sectionBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 청소 정책 탭 -->
        <div class="tab-pane fade" id="tabCleaningPolicy">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h6 class="fw-bold mb-3">룸타입별 청소 정책</h6>
                    <p class="text-muted small mb-3">
                        오버라이드가 없는 룸타입은 "일반 설정"의 기본값이 적용됩니다.
                    </p>
                    <table class="table table-hover mb-0" id="policyTable">
                        <thead class="table-light">
                        <tr>
                            <th>룸타입</th>
                            <th class="text-center">스테이오버</th>
                            <th class="text-center">턴다운</th>
                            <th class="text-center">DND</th>
                            <th class="text-center">상태</th>
                            <th class="text-center" style="width:100px;">관리</th>
                        </tr>
                        </thead>
                        <tbody id="policyBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 구역 생성/수정 모달 -->
    <div class="modal fade" id="sectionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sectionModalTitle">구역 추가</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="sectionEditId">
                    <div class="mb-3">
                        <label class="form-label required">구역 이름</label>
                        <input type="text" class="form-control" id="sectionName" placeholder="예: 3~5층">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">구역 코드</label>
                        <input type="text" class="form-control" id="sectionCode" placeholder="선택적">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">1인 크레딧 상한</label>
                        <input type="number" class="form-control" id="sectionMaxCredits" step="0.1" min="0" placeholder="미지정 시 제한 없음">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">포함 층</label>
                        <div id="sectionFloorCheckboxes" class="d-flex flex-wrap gap-2"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">기본 담당자</label>
                        <div id="sectionHkCheckboxes" class="d-flex flex-wrap gap-2"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" id="btnSaveSection">저장</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 청소 정책 오버라이드 모달 -->
    <div class="modal fade" id="policyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="policyModalTitle">청소 정책 오버라이드</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="policyRoomTypeId">
                    <div class="mb-3 text-muted small">비어있는 필드는 프로퍼티 기본값이 적용됩니다.</div>
                    <div class="row mb-3">
                        <label class="col-sm-5 col-form-label">스테이오버 활성화</label>
                        <div class="col-sm-7">
                            <select class="form-select" id="polStayoverEnabled">
                                <option value="">기본값 사용</option>
                                <option value="true">ON</option>
                                <option value="false">OFF</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-5 col-form-label">스테이오버 횟수</label>
                        <div class="col-sm-7">
                            <input type="number" class="form-control" id="polStayoverFrequency" min="1" max="3" placeholder="기본값 사용">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-5 col-form-label">스테이오버 크레딧</label>
                        <div class="col-sm-7">
                            <input type="number" class="form-control" id="polStayoverCredit" step="0.1" min="0" placeholder="기본값 사용">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-5 col-form-label">스테이오버 우선순위</label>
                        <div class="col-sm-7">
                            <select class="form-select" id="polStayoverPriority">
                                <option value="">기본값 사용</option>
                                <option value="RUSH">긴급</option>
                                <option value="HIGH">높음</option>
                                <option value="NORMAL">보통</option>
                                <option value="LOW">낮음</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-5 col-form-label">턴다운 활성화</label>
                        <div class="col-sm-7">
                            <select class="form-select" id="polTurndownEnabled">
                                <option value="">기본값 사용</option>
                                <option value="true">ON</option>
                                <option value="false">OFF</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-5 col-form-label">턴다운 크레딧</label>
                        <div class="col-sm-7">
                            <input type="number" class="form-control" id="polTurndownCredit" step="0.1" min="0" placeholder="기본값 사용">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-5 col-form-label">DND 정책</label>
                        <div class="col-sm-7">
                            <select class="form-select" id="polDndPolicy">
                                <option value="">기본값 사용</option>
                                <option value="SKIP">스킵</option>
                                <option value="RETRY_AFTERNOON">오후 재시도</option>
                                <option value="FORCE_AFTER_DAYS">N일 후 강제</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-5 col-form-label">DND 최대 스킵 (일)</label>
                        <div class="col-sm-7">
                            <input type="number" class="form-control" id="polDndMaxSkipDays" min="1" max="7" placeholder="기본값 사용">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-5 col-form-label">메모</label>
                        <div class="col-sm-7">
                            <textarea class="form-control" id="polNote" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-between">
                    <button type="button" class="btn btn-outline-danger d-none" id="btnResetPolicy">
                        <i class="fas fa-undo me-1"></i>기본값으로 초기화
                    </button>
                    <div>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                        <button type="button" class="btn btn-primary" id="btnSavePolicy">저장</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script src="/js/hk-settings-page.js"></script>
</th:block>
</body>
</html>
