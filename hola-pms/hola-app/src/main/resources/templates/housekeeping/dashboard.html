<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>하우스키핑 대시보드</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-broom me-2"></i>하우스키핑 대시보드</h4>
        <span class="text-muted" id="dashboardDate"></span>
    </div>

    <!-- 프로퍼티 미선택 알림 -->
    <div id="contextAlert" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-1"></i>호텔과 프로퍼티를 먼저 선택해주세요.
    </div>

    <!-- 요약 카드 -->
    <div class="row g-3 mb-2" id="summaryRow">
        <div class="col-md-2">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <p class="text-muted mb-1">전체</p>
                    <h3 class="mb-0" id="totalCount">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <p class="text-muted mb-1">대기</p>
                    <h3 class="mb-0 text-warning" id="pendingCount">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <p class="text-muted mb-1">진행중</p>
                    <h3 class="mb-0 text-primary" id="inProgressCount">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <p class="text-muted mb-1">완료</p>
                    <h3 class="mb-0 text-success" id="completedCount">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <p class="text-muted mb-1">검수완료</p>
                    <h3 class="mb-0" style="color: #20c997;" id="inspectedCount">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <p class="text-muted mb-1">검수 완료율</p>
                    <h3 class="mb-0" id="completionRate">-</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- 다중 세그먼트 프로그레스 바 (인라인) -->
    <div class="mb-4" id="progressArea">
        <div class="progress" style="height: 22px; border-radius: 6px;">
            <div class="progress-bar" role="progressbar" id="pgPending"
                 style="width: 0%; background-color: #ffc107; color: #333;"></div>
            <div class="progress-bar" role="progressbar" id="pgInProgress"
                 style="width: 0%; background-color: #0582CA;"></div>
            <div class="progress-bar" role="progressbar" id="pgCompleted"
                 style="width: 0%; background-color: #28a745;"></div>
            <div class="progress-bar" role="progressbar" id="pgInspected"
                 style="width: 0%; background-color: #20c997;"></div>
        </div>
    </div>

    <!-- 오늘 근무 현황 + 배정 관리 -->
    <div class="card border-0 shadow-sm mb-4" id="assignmentCard">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div class="d-flex align-items-center flex-wrap gap-2">
                    <span class="text-muted">오늘 근무 현황:</span>
                    <span>출근 <span class="badge bg-success" id="attWorking">0</span></span>
                    <span class="text-muted">·</span>
                    <span>퇴근 <span class="badge bg-primary" id="attLeft">0</span></span>
                    <span class="text-muted">·</span>
                    <span>휴무 <span class="badge bg-secondary" id="attDayOff">0</span></span>
                    <span class="text-muted">·</span>
                    <span>미출근 <span class="badge bg-warning text-dark" id="attBeforeWork">0</span></span>
                    <button class="btn btn-sm btn-outline-secondary ms-2" id="btnAttendance" title="출근부 관리">
                        <i class="fas fa-clipboard-list me-1"></i>출근부
                    </button>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-primary" id="btnAutoAssign">
                        <i class="fas fa-magic me-1"></i>자동 배정
                    </button>
                    <button class="btn btn-sm btn-outline-primary" id="btnRedistribute">
                        <i class="fas fa-balance-scale me-1"></i>크레딧 재분배
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 하우스키퍼별 현황 테이블 -->
    <div class="card border-0 shadow-sm" id="housekeeperCard">
        <div class="card-header bg-white">
            <h6 class="fw-bold mb-0">하우스키퍼별 현황</h6>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0" id="housekeeperTable">
                <thead class="table-light">
                <tr>
                    <th class="text-center">이름</th>
                    <th class="text-center">구역</th>
                    <th class="text-center">근태</th>
                    <th class="text-center">대기</th>
                    <th class="text-center">진행</th>
                    <th class="text-center">완료</th>
                    <th class="text-center">크레딧</th>
                    <th class="text-center">평균시간</th>
                </tr>
                </thead>
                <tbody id="housekeeperBody">
                <tr><td colspan="8" class="text-center text-muted">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 출근부 모달 -->
    <div class="modal fade" id="attendanceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-clipboard-list me-2"></i>오늘 출근부</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="attendanceList"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" id="btnSaveAttendance">저장</button>
                </div>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="scripts">
    <script src="/js/hk-dashboard-page.js"></script>
</th:block>
</body>
</html>
