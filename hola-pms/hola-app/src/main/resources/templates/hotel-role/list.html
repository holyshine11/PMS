<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>호텔 관리자 권한 관리</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-shield-alt me-2"></i>호텔 관리자 권한 관리</h4>
        <a href="/admin/roles/hotel-admins/new" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>권한등록
        </a>
    </div>

    <!-- 검색 -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body py-3">
            <div class="row g-2 align-items-center">
                <div class="col-md-3">
                    <label class="form-label mb-0 small text-muted">호텔명</label>
                    <select id="searchHotelId" class="form-select form-select-sm">
                        <option value="">전체</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label mb-0 small text-muted">권한명</label>
                    <input type="text" id="searchRoleName" class="form-control form-control-sm"
                           placeholder="권한명 검색">
                </div>
                <div class="col-md-3">
                    <label class="form-label mb-0 small text-muted">사용여부</label>
                    <div class="btn-group d-block" role="group">
                        <input type="radio" class="btn-check" name="searchUseYn" id="useYnAll" value="" checked>
                        <label class="btn btn-outline-secondary btn-sm" for="useYnAll">전체</label>
                        <input type="radio" class="btn-check" name="searchUseYn" id="useYnY" value="true">
                        <label class="btn btn-outline-secondary btn-sm" for="useYnY">Y</label>
                        <input type="radio" class="btn-check" name="searchUseYn" id="useYnN" value="false">
                        <label class="btn btn-outline-secondary btn-sm" for="useYnN">N</label>
                    </div>
                </div>
                <div class="col-auto align-self-end">
                    <button class="btn btn-outline-primary btn-sm" onclick="HotelRolePage.search()">검색</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="HotelRolePage.reset()">초기화</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 목록 테이블 -->
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <table id="roleTable" class="table table-hover" style="width:100%">
                <thead class="table-light">
                <tr>
                    <th>NO</th>
                    <th>권한명</th>
                    <th>호텔명</th>
                    <th>사용여부</th>
                    <th>최종수정일시</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div layout:fragment="scripts">
    <script th:src="@{/js/hotel-role-page.js}"></script>
</div>
</body>
</html>
