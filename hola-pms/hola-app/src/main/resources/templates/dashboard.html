<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>대시보드</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="fas fa-tachometer-alt me-2"></i>대시보드</h4>
    </div>

    <div class="row g-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1">전체 호텔</p>
                            <h3 class="fw-bold mb-0" th:text="${hotelCount ?: 0}">0</h3>
                        </div>
                        <div class="bg-primary bg-opacity-10 rounded-3 p-3">
                            <i class="fas fa-hotel fa-2x text-primary"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1">전체 프로퍼티</p>
                            <h3 class="fw-bold mb-0" th:text="${propertyCount ?: 0}">0</h3>
                        </div>
                        <div class="hola-icon-box hola-icon-dark rounded-3 p-3">
                            <i class="fas fa-building fa-2x"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1">전체 객실</p>
                            <h3 class="fw-bold mb-0">0</h3>
                        </div>
                        <div class="hola-icon-box hola-icon-accent rounded-3 p-3">
                            <i class="fas fa-bed fa-2x"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1">오늘 예약</p>
                            <h3 class="fw-bold mb-0">0</h3>
                        </div>
                        <div class="hola-icon-box hola-icon-danger rounded-3 p-3">
                            <i class="fas fa-calendar-check fa-2x"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm mt-4">
        <div class="card-body">
            <h5 class="card-title fw-bold">시스템 현황</h5>
            <p class="text-muted">Hola PMS v0.1.0 - Phase 0 기반 구축 완료</p>
            <ul class="list-unstyled">
                <li><i class="fas fa-check-circle text-primary me-2"></i>관리자 인증 시스템</li>
                <li><i class="fas fa-check-circle text-primary me-2"></i>멀티테넌시 기반 구조</li>
                <li><i class="fas fa-check-circle text-primary me-2"></i>호텔/프로퍼티 관리</li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
