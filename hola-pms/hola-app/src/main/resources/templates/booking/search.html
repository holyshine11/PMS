<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/booking}">
<head>
    <title>객실 예약</title>
</head>
<body>
<main layout:fragment="content">

    <!-- 히어로 섹션 -->
    <section class="booking-hero">
        <div class="container" style="position:relative; z-index:1;">
            <div class="text-center text-white">
                <p class="hero-subtitle mb-2" id="hotelName"></p>
                <h1 class="hero-title mb-3" id="propertyName">객실 예약</h1>
                <p class="hero-desc mb-0" id="propertyAddress"></p>
            </div>
        </div>
    </section>

    <!-- 검색 카드 -->
    <section class="booking-search-section">
        <div class="container">
            <div class="search-card">
                <!-- 캘린더 -->
                <div id="calendarContainer" class="bk-calendar"></div>

                <!-- 인원 + 검색 -->
                <div class="search-guests-row">
                    <div class="bk-stepper" style="flex:1;">
                        <div class="bk-stepper-label">성인</div>
                        <div class="bk-stepper-control">
                            <button type="button" class="bk-stepper-btn" id="adultsDecrease">&#8722;</button>
                            <span class="bk-stepper-value" id="adultsValue">2</span>
                            <button type="button" class="bk-stepper-btn" id="adultsIncrease">&#43;</button>
                        </div>
                    </div>
                    <div class="bk-stepper" style="flex:1;">
                        <div class="bk-stepper-label">아동<small>만 12세 이하</small></div>
                        <div class="bk-stepper-control">
                            <button type="button" class="bk-stepper-btn" id="childrenDecrease">&#8722;</button>
                            <span class="bk-stepper-value" id="childrenValue">0</span>
                            <button type="button" class="bk-stepper-btn" id="childrenIncrease">&#43;</button>
                        </div>
                    </div>
                </div>

                <!-- 검색 버튼 -->
                <div class="search-action-row">
                    <button type="button" class="btn btn-booking btn-booking-lg" id="btnSearch">
                        <i class="fas fa-search"></i> 객실 검색
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- 에러 -->
    <div class="container mt-4">
        <div class="alert alert-danger d-none" id="errorAlert" role="alert">
            <i class="fas fa-exclamation-circle me-1"></i>
            <span id="errorMessage"></span>
        </div>
    </div>

    <input type="hidden" id="propertyCode" th:value="${propertyCode}">

</main>

<th:block layout:fragment="scripts">
<script>
    $(function() {
        document.body.classList.add('has-hero');
        HolaBooking.SearchPage.init();
    });
</script>
</th:block>
</body>
</html>
