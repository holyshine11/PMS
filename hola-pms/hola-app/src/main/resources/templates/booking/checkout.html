<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/booking}">
<head>
    <title>예약 정보 입력</title>
</head>
<body>
<main layout:fragment="content">

    <!-- 스텝 인디케이터 -->
    <section class="step-indicator-section">
        <div class="container">
            <div class="step-indicator">
                <div class="step completed"><span class="step-num">1</span><span class="step-text">날짜 선택</span></div>
                <div class="step-line completed"></div>
                <div class="step completed"><span class="step-num">2</span><span class="step-text">객실 선택</span></div>
                <div class="step-line completed"></div>
                <div class="step active"><span class="step-num">3</span><span class="step-text">정보 입력</span></div>
                <div class="step-line"></div>
                <div class="step"><span class="step-num">4</span><span class="step-text">예약 완료</span></div>
            </div>
        </div>
    </section>

    <!-- 메인 콘텐츠 -->
    <section class="checkout-section">
        <div class="container">
            <!-- 예약 데이터 없음 -->
            <div class="alert alert-warning d-none" id="noDataAlert">
                <i class="fas fa-exclamation-triangle me-1"></i>
                선택된 객실 정보가 없습니다.
                <a th:href="@{/booking/{code}(code=${propertyCode})}" class="alert-link ms-2">검색 페이지로 이동</a>
            </div>

            <div class="row" id="checkoutContent" style="display:none;">
                <!-- 좌측: 입력 폼 -->
                <div class="col-lg-8">
                    <!-- 투숙객 정보 -->
                    <div class="bk-card">
                        <div class="bk-card__title"><i class="fas fa-user-edit"></i> 투숙객 정보</div>
                        <form id="guestForm">
                            <!-- 성명 그룹 -->
                            <div class="form-group-section">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="guestNameKo" class="form-label required">성명 (한글)</label>
                                        <input type="text" class="form-control" id="guestNameKo" placeholder="홍길동" required maxlength="50">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">성명 (영문)</label>
                                        <div class="row g-2">
                                            <div class="col-6">
                                                <input type="text" class="form-control" id="guestFirstNameEn" placeholder="First Name" maxlength="50">
                                            </div>
                                            <div class="col-6">
                                                <input type="text" class="form-control" id="guestLastNameEn" placeholder="Last Name" maxlength="50">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- 연락처 그룹 -->
                            <div class="form-group-section">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="phoneNumber" class="form-label required">휴대전화</label>
                                        <div class="input-group">
                                            <select class="form-select" id="phoneCountryCode" style="max-width:90px;">
                                                <option value="+82" selected>+82</option>
                                                <option value="+1">+1</option>
                                                <option value="+81">+81</option>
                                                <option value="+86">+86</option>
                                            </select>
                                            <input type="tel" class="form-control" id="phoneNumber" placeholder="010-1234-5678" required maxlength="20">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="email" class="form-label required">이메일</label>
                                        <input type="email" class="form-control" id="email" placeholder="guest@example.com" required maxlength="100">
                                    </div>
                                </div>
                            </div>
                            <!-- 기타 -->
                            <div class="form-group-section">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="nationality" class="form-label">국적</label>
                                        <select class="form-select" id="nationality">
                                            <option value="KR" selected>대한민국</option>
                                            <option value="US">미국</option>
                                            <option value="JP">일본</option>
                                            <option value="CN">중국</option>
                                            <option value="OTHER">기타</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- 결제 정보 -->
                    <div class="bk-card">
                        <div class="bk-card__title"><i class="fas fa-credit-card"></i> 결제 수단</div>
                        <div class="d-flex align-items-center gap-3 mb-0">
                            <div class="payment-method-option selected" data-method="CARD">
                                <i class="fas fa-credit-card"></i> 신용카드
                            </div>
                            <div class="payment-method-option" data-method="EASY_PAY">
                                <i class="fas fa-bolt"></i> 간편결제
                            </div>
                        </div>
                        <!-- 간편결제 패널 -->
                        <div id="easyPayPanel" class="easy-pay-panel" style="display:none;">
                            <div class="easy-pay-cards" id="easyPayCards">
                                <!-- 등록된 카드가 여기에 렌더링됨 -->
                                <div class="easy-pay-add" id="btnAddEasyCard">
                                    <div class="easy-pay-add-icon">
                                        <i class="fas fa-plus"></i>
                                    </div>
                                    <span class="easy-pay-add-text">카드 추가</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 약관 동의 -->
                    <div class="bk-card">
                        <div class="bk-card__title"><i class="fas fa-file-contract"></i> 약관 동의</div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="agreeAll">
                            <label class="form-check-label" for="agreeAll" style="font-weight:600;">전체 동의</label>
                        </div>
                        <hr class="my-2">
                        <div class="form-check mb-2">
                            <input class="form-check-input agree-item" type="checkbox" id="agreeTerms" required>
                            <label class="form-check-label" for="agreeTerms" style="font-size:0.875rem;">[필수] 이용약관 동의</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input agree-item" type="checkbox" id="agreePrivacy" required>
                            <label class="form-check-label" for="agreePrivacy" style="font-size:0.875rem;">[필수] 개인정보 수집 및 이용 동의</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input agree-item" type="checkbox" id="agreeCancel">
                            <label class="form-check-label" for="agreeCancel" style="font-size:0.875rem;">[선택] 취소/환불 규정 안내 확인</label>
                        </div>
                    </div>
                </div>

                <!-- 우측: 예약 요약 -->
                <div class="col-lg-4">
                    <div class="summary-card">
                        <div class="summary-card__title"><i class="fas fa-receipt"></i> 예약 요약</div>
                        <div class="summary-room-preview" id="summaryRoomInfo"></div>
                        <div class="summary-row">
                            <span>체크인</span>
                            <span id="summaryCheckIn">-</span>
                        </div>
                        <div class="summary-row">
                            <span>체크아웃</span>
                            <span id="summaryCheckOut">-</span>
                        </div>
                        <div class="summary-row">
                            <span id="summaryNightsLabel">숙박</span>
                            <span id="summaryNights">-</span>
                        </div>
                        <div class="summary-row">
                            <span>인원</span>
                            <span id="summaryGuests">-</span>
                        </div>
                        <div class="summary-total">
                            <span>결제 금액</span>
                            <span id="summaryTotal">-</span>
                        </div>

                        <button type="button" class="btn btn-booking w-100 mt-3 btn-booking-lg" id="btnSubmitBooking" disabled>
                            예약하기
                        </button>
                    </div>
                </div>
            </div>

            <!-- 에러 -->
            <div class="alert alert-danger d-none mt-3" id="errorAlert" role="alert">
                <i class="fas fa-exclamation-circle me-1"></i>
                <span id="errorMessage"></span>
            </div>
        </div>
    </section>

    <input type="hidden" id="propertyCode" th:value="${propertyCode}">

</main>

<th:block layout:fragment="scripts">
<script>
    $(function() { HolaBooking.CheckoutPage.init(); });
</script>
</th:block>
</body>
</html>
