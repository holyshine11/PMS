<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>개인정보 수정</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fas fa-user-edit me-2"></i>개인정보 수정
        </h4>
    </div>

    <!-- 프로필 수정 섹션 -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <h6 class="fw-bold mb-3">기본 정보</h6>
            <form id="profileForm">
                <!-- 아이디 / 회원번호 (읽기전용) -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">아이디</label>
                    <div class="col-sm-3">
                        <span id="loginId" class="form-control-plaintext text-muted">-</span>
                    </div>
                    <label class="col-sm-2 col-form-label">회원번호</label>
                    <div class="col-sm-3">
                        <span id="memberNumber" class="form-control-plaintext text-muted">-</span>
                    </div>
                </div>

                <!-- 계정유형 / 가입일 (읽기전용) -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">계정유형</label>
                    <div class="col-sm-3">
                        <span id="accountType" class="form-control-plaintext text-muted">-</span>
                    </div>
                    <label class="col-sm-2 col-form-label">가입일</label>
                    <div class="col-sm-3">
                        <span id="createdAt" class="form-control-plaintext text-muted">-</span>
                    </div>
                </div>

                <!-- 권한 (읽기전용) -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">권한</label>
                    <div class="col-sm-8">
                        <span id="roleName" class="form-control-plaintext text-muted">-</span>
                    </div>
                </div>

                <hr class="mb-3">

                <!-- 담당자명 -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label required">담당자명</label>
                    <div class="col-sm-6">
                        <input type="text" id="userName" class="form-control" maxlength="100"
                               placeholder="담당자명을 입력하세요" required>
                    </div>
                </div>

                <!-- 휴대폰 -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">휴대폰</label>
                    <div class="col-sm-2">
                        <select id="mobileCountryCode" class="form-select">
                            <option th:replace="~{layout/fragments/common-fields :: countryCodeOptions}"></option>
                        </select>
                    </div>
                    <div class="col-sm-6">
                        <input type="text" id="mobile" class="form-control" maxlength="20"
                               placeholder="010-1234-5678">
                    </div>
                </div>

                <!-- 이메일 -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">이메일</label>
                    <div class="col-sm-8">
                        <input type="email" id="email" class="form-control" maxlength="200"
                               placeholder="이메일을 입력하세요">
                    </div>
                </div>

                <!-- 연락처 -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">연락처</label>
                    <div class="col-sm-2">
                        <select id="phoneCountryCode" class="form-select">
                            <option th:replace="~{layout/fragments/common-fields :: countryCodeOptions}"></option>
                        </select>
                    </div>
                    <div class="col-sm-6">
                        <input type="text" id="phone" class="form-control" maxlength="20"
                               placeholder="02-1234-5678">
                    </div>
                </div>

                <!-- 부서명 -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">부서명</label>
                    <div class="col-sm-6">
                        <input type="text" id="department" class="form-control" maxlength="100"
                               placeholder="부서명을 입력하세요">
                    </div>
                </div>

                <!-- 직급/직책 -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">직급/직책</label>
                    <div class="col-sm-6">
                        <input type="text" id="position" class="form-control" maxlength="100"
                               placeholder="직급/직책을 입력하세요">
                    </div>
                </div>

                <!-- 버튼 -->
                <hr>
                <div class="d-flex justify-content-end">
                    <button type="button" class="btn btn-primary" onclick="MyProfileForm.saveProfile()">
                        <i class="fas fa-save me-1"></i>저장
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 비밀번호 변경 섹션 -->
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h6 class="fw-bold mb-3">비밀번호 변경</h6>
            <form id="passwordForm">
                <!-- 현재 비밀번호 -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label required">현재 비밀번호</label>
                    <div class="col-sm-6">
                        <input type="password" id="currentPassword" class="form-control"
                               placeholder="현재 비밀번호를 입력하세요" required>
                    </div>
                </div>

                <!-- 새 비밀번호 -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label required">새 비밀번호</label>
                    <div class="col-sm-6">
                        <input type="password" id="newPassword" class="form-control"
                               placeholder="10~20자, 영문+숫자+특수문자" required>
                    </div>
                </div>

                <!-- 비밀번호 확인 -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label required">비밀번호 확인</label>
                    <div class="col-sm-6">
                        <input type="password" id="confirmPassword" class="form-control"
                               placeholder="새 비밀번호를 다시 입력하세요" required>
                    </div>
                </div>

                <!-- 버튼 -->
                <hr>
                <div class="d-flex justify-content-end">
                    <button type="button" class="btn btn-outline-warning" onclick="MyProfileForm.changePassword()">
                        <i class="fas fa-key me-1"></i>비밀번호 변경
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div layout:fragment="scripts">
    <script th:src="@{/js/my-profile-form.js}"></script>
</div>
</body>
</html>
