<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | Hola Hotel">Hola Hotel</title>

    <!-- Pretendard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Booking CSS -->
    <link th:href="@{/css/booking.css}" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg booking-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#" id="brandLink" onclick="HolaBooking.goHome(); return false;">
                <span class="brand-text">HOLA</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <a th:href="@{/booking/my-reservation}" class="nav-link-light">
                    <i class="fas fa-concierge-bell me-1"></i>예약 조회
                </a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main layout:fragment="content">
    </main>

    <!-- Footer -->
    <footer class="booking-footer">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <p class="footer-brand">HOLA HOTELS &amp; RESORTS</p>
                    <p class="mb-0">고객센터 1588-0000 | 평일 09:00 ~ 18:00</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="mb-0">&copy; 2026 Hola Hotels. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Booking JS -->
    <script th:src="@{/js/booking.js}"></script>
    <!-- Page Scripts -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
