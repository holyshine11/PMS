<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | Hola Hotel">Hola Hotel</title>

    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- 게스트 전용 CSS -->
    <link th:href="@{/css/booking.css}" rel="stylesheet">
</head>
<body>

    <!-- 게스트 헤더 -->
    <nav class="navbar navbar-expand-lg booking-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/booking}">
                <span class="brand-text">HOLA</span>
            </a>
            <div class="d-flex align-items-center">
                <a href="#" class="btn btn-outline-light btn-sm" id="btnLangKo">KO</a>
                <span class="text-white-50 mx-1">|</span>
                <a href="#" class="btn btn-outline-light btn-sm" id="btnLangEn">EN</a>
            </div>
        </div>
    </nav>

    <!-- 메인 콘텐츠 -->
    <main layout:fragment="content">
    </main>

    <!-- 푸터 -->
    <footer class="booking-footer">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <p class="mb-1 fw-bold">HOLA Hotels &amp; Resorts</p>
                    <p class="mb-0 text-muted small">고객센터 1588-0000 | 평일 09:00 ~ 18:00</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="mb-0 text-muted small">&copy; 2026 Hola Hotels. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 부킹엔진 JS -->
    <script th:src="@{/js/booking.js}"></script>
    <!-- 페이지별 추가 스크립트 -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
