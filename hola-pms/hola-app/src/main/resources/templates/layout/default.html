<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Hola PMS</title>

    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- DataTables + Bootstrap5 -->
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <!-- 커스텀 CSS -->
    <link th:href="@{/css/hola.css}" rel="stylesheet">
</head>
<body>
    <script>if(new URLSearchParams(location.search).get('mode')==='popup')document.body.classList.add('popup-mode');</script>
    <!-- 헤더 -->
    <div th:replace="~{layout/fragments/header :: header}"></div>

    <div class="d-flex">
        <!-- 사이드바 -->
        <div th:replace="~{layout/fragments/sidebar :: sidebar}"></div>

        <!-- 메인 콘텐츠 -->
        <main class="flex-grow-1 p-4 main-content" style="margin-left: 250px; margin-top: 56px;">
            <div layout:fragment="content"></div>
        </main>
    </div>

    <!-- jQuery 3.7 -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables -->
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <!-- 공통 JS -->
    <script th:src="@{/js/hola-common.js}"></script>
    <!-- 페이지별 스크립트 -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
